                        const k1 = k0 * (1 - delta_k_factor);
                        const k2 = k0 * (1 + delta_k_factor);
                        const v0_ref = baseOmega / k0;
                        const D = waveParams.dispersionFactor * v0_ref / k0;
                        const omega1 = k1 * v0_ref - D * k1 * (k1 - k0);
                        const omega2 = k2 * v0_ref - D * k2 * (k2 - k0);
                        const k_mod = (k2 - k1) / 2.0;
                        const omega_mod = (omega2 - omega1) / 2.0;
                        const lambda_env = (k_mod === 0 || isNaN(k_mod)) ? Infinity : (2 * Math.PI) / Math.abs(k_mod);
                        const phaseOffset_env = -omega_mod * animationTime;
                        updateWaveGeometry(groupWaveEnvelopeUpper, lambda_env, 2 * A_comp, phaseOffset_env, {
                            isEnvelope: true
                        });
                        updateWaveGeometry(groupWaveEnvelopeLower, lambda_env, -2 * A_comp, phaseOffset_env, {
                            isEnvelope: true
                        });
                        const positions = groupWaveSuperposition.geometry.attributes.position.array;
                        const time_factor_vg = 1.0;
                        for (let i = 0; i < waveParams.points; i++) {
                            const x_pos = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2);
                            const y1 = calculateWavePoint(x_pos, k1, omega1, A_comp, animationTime * time_factor_vg, 0);
                            const y2 = calculateWavePoint(x_pos, k2, omega2, A_comp, animationTime * time_factor_vg, 0);
                            positions[i * 3 + 1] = y1 + y2;
                        }
                        groupWaveSuperposition.geometry.attributes.position.needsUpdate = true;
                        if (groupWaveComp1) updateWaveGeometry(groupWaveComp1, (2 * Math.PI) / k1, A_comp, -omega1 * animationTime * time_factor_vg);
                        if (groupWaveComp2) updateWaveGeometry(groupWaveComp2, (2 * Math.PI) / k2, A_comp, -omega2 * animationTime * time_factor_vg);
                        let groupMarkerX = (k_mod === 0) ? 0 : (-phaseOffset_env) / k_mod;
                        const lambda_env_vis = (k_mod === 0) ? waveParams.extent * 2 : Math.abs(2 * Math.PI / k_mod);
                        while (groupMarkerX > waveParams.extent / 2 + lambda_env_vis) groupMarkerX -= lambda_env_vis;
                        while (groupMarkerX < -waveParams.extent / 2 - lambda_env_vis) groupMarkerX += lambda_env_vis;
                        if (groupMarkerX > waveParams.extent / 2 && k_mod !== 0) groupMarkerX -= lambda_env_vis;
                        else if (groupMarkerX < -waveParams.extent / 2 && k_mod !== 0) groupMarkerX += lambda_env_vis;
                        groupMarkerViz.position.set(groupMarkerX, 2 * A_comp * Math.cos(k_mod * groupMarkerX + phaseOffset_env), 0.1);
                        const k_carr_avg = (k1 + k2) / 2;
                        const omega_carr_avg = (omega1 + omega2) / 2;
                        let phaseMarkerX_g = (k_carr_avg === 0) ? 0 : (Math.PI / 2 - (-omega_carr_avg * animationTime * time_factor_vg)) / k_carr_avg;
                        const lambda_carr_vis = (k_carr_avg === 0) ? waveParams.extent * 2 : Math.abs(2 * Math.PI / k_carr_avg);
                        while (phaseMarkerX_g > waveParams.extent / 2 + lambda_carr_vis) phaseMarkerX_g -= lambda_carr_vis;
                        while (phaseMarkerX_g < -waveParams.extent / 2 - lambda_carr_vis) phaseMarkerX_g += lambda_carr_vis;
                        const y_env_at_phase_marker = 2 * A_comp * Math.cos(k_mod * phaseMarkerX_g + phaseOffset_env);
                        const y_carrier_at_marker = y_env_at_phase_marker * Math.sin(k_carr_avg * phaseMarkerX_g - omega_carr_avg * animationTime * time_factor_vg + Math.PI / 2);
                        phaseMarkerViz.position.set(phaseMarkerX_g, y_carrier_at_marker, 0.1);
                        // Velocity readout
                        const v_phase = omega_carr_avg / k_carr_avg;
                        const v_group = (omega2 - omega1) / (k2 - k1);
                        const readout = document.getElementById('velocity-readout');
                        if (readout) {
                            readout.innerHTML =
                                `<span style="color:#f1c40f">●</span> v_phase = ω̄/k̄ = <b>${v_phase.toFixed(3)}</b><br>` +
                                `<span style="color:cyan">●</span> v_group = dω/dk ≈ <b>${v_group.toFixed(3)}</b><br>` +
                                `Ratio v_g / v_φ = <b>${(v_group / v_phase).toFixed(3)}</b>`;
                        }
                    }
                    break;
                }
                case 'wave_type_comparison': {
                    const k_comp = (2 * Math.PI) / waveParams.wavelength;
                    const omega_comp = omegaAnimation;
                    particleSystemViz.forEach(particle => {
                        const x_i = particle.userData.initialX;
                        if (waveParams.waveComparisonType === 'transverse') {
                            particle.position.y = waveParams.amplitude * Math.sin(k_comp * x_i - omega_comp * animationTime);
                            particle.position.x = x_i;
                        } else {
                            particle.position.x = x_i + waveParams.amplitude * 0.5 * Math.sin(k_comp * x_i - omega_comp * animationTime);
                            particle.position.y = 0;
                        }
                    });
                    break;
                }
                case 'wavefront': {
                    const wavefrontSpeed = 0.02;
                    wavefrontObjects.forEach(wf => {
                        if (waveParams.wavefrontType === 'plane') {
                            wf.position.x += wavefrontSpeed;
                            if (wf.geometry.parameters && wf.position.x > waveParams.extent / 2 + wf.geometry.parameters.width / 2 + 1.0) {
                                wf.position.x = -waveParams.extent / 2 - wf.geometry.parameters.width / 2 - (Math.random() * 0.5);
                            }
                        } else {
                            if (wf.geometry.parameters && typeof wf.geometry.parameters.radius !== 'undefined') {
                                let newScale = wf.scale.x + wavefrontSpeed * 0.3;
                                if (newScale * wf.geometry.parameters.radius > waveParams.extent / 1.8) {
                                    newScale = 0.1 + (Math.random() * 0.2);
                                }
                                wf.scale.setScalar(newScale);
                            }
                        }
                    });
                    break;
                }
                case 'wave_scattering': {
                    const omega_t = scatteringParams.oscillationFrequency * animationTime;
                    const firstPeakOffset = ((scatteringParams.waveSpeed * animationTime - (scatteringParams.wavelength / 4)) % scatteringParams.wavelength + scatteringParams.wavelength) % scatteringParams.wavelength;
                    if (scatteringParams.polarizationType === 'non_polarized') {
                        for (let i = 0; i < scatteringParams.numPlanes; i++) {
                            const peakX = scatteringParams.sceneExtent + firstPeakOffset - i * scatteringParams.wavelength;
                            if (!scatteringViz.incomingWave.passedParticle[i] && peakX < 0) scatteringViz.incomingWave.passedParticle[i] = true;
                            if (scatteringViz.incomingWave.passedParticle[i] && peakX > scatteringParams.sceneExtent) {
                                scatteringViz.incomingWave.passedParticle[i] = false;
                                scatteringViz.incomingWave.polarizationAngles[i] = Math.random() * 2 * Math.PI;
                            }
                        }
                    }
                    const k_scatter = (2 * Math.PI) / scatteringParams.wavelength;
                    for (let i = 0; i < scatteringParams.numPlanes; i++) {
                        const peakX = scatteringParams.sceneExtent + firstPeakOffset - i * scatteringParams.wavelength;
                        scatteringViz.incomingWave.planes[i].position.x = peakX;
                        scatteringViz.incomingWave.planes[i].visible = scatteringParams.showWavefront;
                        for (let j = 0; j < scatteringParams.vectorsPerCycle; j++) {
                            const vector = scatteringViz.incomingWave.vectors[i][j];
                            vector.position.x = peakX - (j / scatteringParams.vectorsPerCycle) * scatteringParams.wavelength;
                            const phase = omega_t - k_scatter * vector.position.x;
                            const amplitude = -Math.sin(phase);
                            let polarizationDir = new THREE.Vector3();
                            switch (scatteringParams.polarizationType) {
                                case 'linear_vertical':
                                    polarizationDir.set(0, 1, 0);
                                    break;
                                case 'linear_horizontal':
                                    polarizationDir.set(0, 0, 1);
                                    break;
                                case 'non_polarized':
                                    const currentAngle = scatteringViz.incomingWave.polarizationAngles[i];
                                    polarizationDir.set(0, Math.cos(currentAngle), Math.sin(currentAngle));
                                    break;
                            }
                            vector.setDirection(amplitude >= 0 ? polarizationDir : polarizationDir.clone().multiplyScalar(-1));
                            vector.setLength(Math.abs(amplitude) * 1.5, 0.4, 0.2);
                            vector.setColor(amplitude >= 0 ? 0xFFFF00 : 0xE74C3C);
                            vector.visible = Math.abs(amplitude) > 0.05;
                        }
                    }
                    const particlePhase = omega_t;
                    let particleAngle = 0;
                    if (scatteringParams.polarizationType === 'non_polarized') {
                        const i_particle = Math.floor((scatteringParams.sceneExtent + firstPeakOffset) / scatteringParams.wavelength);
                        particleAngle = scatteringViz.incomingWave.polarizationAngles[Math.max(0, Math.min(i_particle, scatteringParams.numPlanes - 1))];
                    }
                    const effectiveAmplitude = scatteringParams.baseAmplitude / scatteringParams.particleMass;
                    let displacement = new THREE.Vector3();
                    switch (scatteringParams.polarizationType) {
                        case 'linear_vertical':
                            displacement.y = -Math.sin(particlePhase);
                            break;
                        case 'linear_horizontal':
                            displacement.z = -Math.sin(particlePhase);
                            break;
                        case 'non_polarized':
                            displacement.set(0, -Math.sin(particlePhase) * Math.cos(particleAngle), -Math.sin(particlePhase) * Math.sin(particleAngle));
                            break;
                    }
                    scatteringViz.lastParticleAngle = particleAngle;
                    if (scatteringViz.particle) scatteringViz.particle.position.copy(displacement).multiplyScalar(effectiveAmplitude * scatteringParams.particleCharge);
                    emitScatteringPulse(particlePhase);
                    updateRadiatedScatteringWave(effectiveAmplitude);
                    drawPolarDipole(scatteringParams.polarizationType);
                    break;
                }
                case 'reflection_transmission': {
                    // 1D plane wave at normal incidence: r = (n1-n2)/(n1+n2), t = 2n1/(n1+n2).
                    // We display the spatial wave at fixed omega. Use a fixed source wavelength
                    // in vacuum, then λ in each medium scales as 1/n.
                    const lambda0 = 2.0;
                    const A0 = 1.0;
                    const n1 = waveParams.n1, n2 = waveParams.n2;
                    const r_amp = (n1 - n2) / (n1 + n2);
                    const t_amp = 2 * n1 / (n1 + n2);
                    const lambda1 = lambda0 / n1;
                    const lambda2 = lambda0 / n2;
                    const k1 = (2 * Math.PI) / lambda1;
                    const k2 = (2 * Math.PI) / lambda2;
                    // Common angular frequency: ω = k1 * v1 = k2 * v2 (v_i = c/n_i). Take ω = k1 / n1 * something:
                    // Simpler: pick ω so that on-screen motion is reasonable. ω drives time evolution only.
                    const omega = omegaAnimation;
                    const phaseT = -omega * animationTime;
                    const posI = reflectionWaveIncident.geometry.attributes.position.array;
                    const posR = reflectionWaveReflected.geometry.attributes.position.array;
                    const posT = reflectionWaveTransmitted.geometry.attributes.position.array;
                    const posL = waveLine1.geometry.attributes.position.array;
                    for (let i = 0; i < waveParams.points; i++) {
                        const x = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2);
                        let yI = 0, yR = 0, yT = 0;
                        if (x <= 0) {
                            yI = A0 * Math.sin(k1 * x + phaseT);              // moving right
                            yR = r_amp * A0 * Math.sin(-k1 * x + phaseT);     // moving left
                        } else {
                            yT = t_amp * A0 * Math.sin(k2 * x + phaseT);      // moving right in medium 2
                        }
                        posI[i*3] = x; posI[i*3+1] = yI; posI[i*3+2] = 0;
                        posR[i*3] = x; posR[i*3+1] = yR; posR[i*3+2] = 0;
                        posT[i*3] = x; posT[i*3+1] = yT; posT[i*3+2] = 0;
                        // Resultant only on the left side (sum of incident + reflected).
                        // On the right side the resultant equals the transmitted, so leave it at 0 to avoid hiding the green line.
                        posL[i*3] = x; posL[i*3+1] = (x <= 0) ? (yI + yR) : 0; posL[i*3+2] = 0;
                    }
                    reflectionWaveIncident.geometry.attributes.position.needsUpdate = true;
                    reflectionWaveReflected.geometry.attributes.position.needsUpdate = true;
                    reflectionWaveTransmitted.geometry.attributes.position.needsUpdate = true;
                    waveLine1.geometry.attributes.position.needsUpdate = true;
                    const info = document.getElementById('rt-coefs');
                    if (info) {
                        const R = r_amp * r_amp;
                        const T = (n2 / n1) * t_amp * t_amp;
                        info.innerHTML = `r = (n₁−n₂)/(n₁+n₂) = <b>${r_amp.toFixed(3)}</b><br>` +
                                         `t = 2n₁/(n₁+n₂) = <b>${t_amp.toFixed(3)}</b><br>` +
                                         `R = r² = <b>${R.toFixed(3)}</b>, &nbsp; T = (n₂/n₁)t² = <b>${T.toFixed(3)}</b><br>` +
                                         `R + T = <b>${(R + T).toFixed(3)}</b> (should be 1)`;
                    }
                    break;
                }
                case 'beats': {
                    if (!beatsWave1 || !beatsWave2 || !beatsSuperposition) break;
                    const f1 = waveParams.beatFreq1;
                    const f2 = waveParams.beatFreq2;
                    const A_b = 0.6;
                    const v_b = 1.0; // speed: λ = v/f
                    const k1 = 2 * Math.PI * f1 / v_b;
                    const k2 = 2 * Math.PI * f2 / v_b;
                    const omega1 = 2 * Math.PI * f1;
                    const omega2 = 2 * Math.PI * f2;
                    updateWaveGeometry(beatsWave1, 2 * Math.PI / k1, A_b, -omega1 * animationTime * 0.3);
                    updateWaveGeometry(beatsWave2, 2 * Math.PI / k2, A_b, -omega2 * animationTime * 0.3);
                    const p1 = beatsWave1.geometry.attributes.position.array;
                    const p2 = beatsWave2.geometry.attributes.position.array;
                    const ps = beatsSuperposition.geometry.attributes.position.array;
                    const peU = beatsEnvelopeUpper.geometry.attributes.position.array;
                    const peL = beatsEnvelopeLower.geometry.attributes.position.array;
                    const k_mod = (k2 - k1) / 2;
                    const omega_mod = (omega2 - omega1) / 2;
                    for (let i = 0; i < waveParams.points; i++) {
                        const x = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2);
                        ps[i*3] = p1[i*3];
                        ps[i*3+1] = p1[i*3+1] + p2[i*3+1];
                        ps[i*3+2] = 0;
                        const env = 2 * A_b * Math.cos(k_mod * x - omega_mod * animationTime * 0.3);
                        peU[i*3] = x; peU[i*3+1] = env; peU[i*3+2] = 0;
                        peL[i*3] = x; peL[i*3+1] = -env; peL[i*3+2] = 0;
                    }
                    beatsSuperposition.geometry.attributes.position.needsUpdate = true;
                    beatsEnvelopeUpper.geometry.attributes.position.needsUpdate = true;
                    beatsEnvelopeLower.geometry.attributes.position.needsUpdate = true;
                    const info = document.getElementById('beat-readout');
                    if (info) {
                        const fbeat = Math.abs(f1 - f2);
                        const favg = 0.5 * (f1 + f2);
                        info.innerHTML = `f̄ = (f₁+f₂)/2 = <b>${favg.toFixed(3)}</b><br>` +
                                         `f_beat = |f₁ − f₂| = <b>${fbeat.toFixed(3)}</b><br>` +
                                         `T_beat = <b>${(fbeat > 0 ? (1 / fbeat).toFixed(2) : '∞')}</b>`;
                    }
                    break;
                }
                case 'snell': {
                    if (!snellIncidentRay) break;
                    const theta_i = waveParams.snellTheta_i;
                    const n1 = waveParams.snellN1, n2 = waveParams.snellN2;
                    // Snell: sin(θt) = (n1/n2) sin(θi). Total internal reflection if > 1.
                    const sin_t = (n1 / n2) * Math.sin(theta_i);
                    const totalInternal = sin_t > 1;
                    const theta_t = totalInternal ? null : Math.asin(sin_t);
                    const L = waveParams.extent / 2 * 0.9;
                    // Geometry:
                    // Interface is horizontal (y=0); normal is vertical (y-axis).
                    // Incident ray comes from upper-left, hits origin.
                    // Reflected goes to upper-right, refracted goes to lower-right (or back up if TIR).
                    // θ is measured from the normal (y-axis).
                    const setLinePoints = (line, p0, p1) => {
                        const arr = line.geometry.attributes.position.array;
                        arr[0] = p0.x; arr[1] = p0.y; arr[2] = p0.z;
                        arr[3] = p1.x; arr[4] = p1.y; arr[5] = p1.z;
                        line.geometry.attributes.position.needsUpdate = true;
                        line.geometry.computeBoundingSphere();
                    };
                    const origin = new THREE.Vector3(0, 0, 0.1);
                    const inc_start = new THREE.Vector3(-L * Math.sin(theta_i), L * Math.cos(theta_i), 0.1);
                    setLinePoints(snellIncidentRay, inc_start, origin);
                    const refl_end = new THREE.Vector3(L * Math.sin(theta_i), L * Math.cos(theta_i), 0.1);
                    setLinePoints(snellReflectedRay, origin, refl_end);
                    if (totalInternal) {
                        setLinePoints(snellRefractedRay, origin, origin);
                        snellRefractedRay.visible = false;
                    } else {
                        snellRefractedRay.visible = true;
                        const ref_end = new THREE.Vector3(L * Math.sin(theta_t), -L * Math.cos(theta_t), 0.1);
                        setLinePoints(snellRefractedRay, origin, ref_end);
                    }
                    const info = document.getElementById('snell-readout');
                    if (info) {
                        const t_deg = totalInternal ? '— (TIR)' : (theta_t * 180 / Math.PI).toFixed(1) + '°';
                        const critical = (n1 > n2) ? (Math.asin(n2 / n1) * 180 / Math.PI).toFixed(1) + '°' : 'n/a';
                        info.innerHTML = `θᵢ = <b>${(theta_i * 180 / Math.PI).toFixed(1)}°</b><br>` +
                                         `θₜ = <b>${t_deg}</b><br>` +
                                         `Critical angle (n₁→n₂): <b>${critical}</b>` +
                                         (totalInternal ? '<br><span style="color:#e74c3c">Total internal reflection</span>' : '');
                    }
                    break;
                }
                case 'atomic_form_factor': {
                    if (!aff_kInArrow || !aff_kOutArrow || !aff_qArrow) break;
                    const kmag = waveParams.aff_k_in_mag;
                    const a = waveParams.aff_atomSize;
                    const Z = waveParams.aff_Z;
                    // Build vectors (in screen plane, z=0.1)
                    const kIn  = new THREE.Vector3(kmag * Math.cos(waveParams.aff_theta_in),  kmag * Math.sin(waveParams.aff_theta_in),  0);
                    const kOut = new THREE.Vector3(kmag * Math.cos(waveParams.aff_theta_out), kmag * Math.sin(waveParams.aff_theta_out), 0);
                    const Q = new THREE.Vector3().subVectors(kOut, kIn);
                    // Arrow scaling: map k-magnitude (max 10) to visual length max ~3
                    const visScale = 3 / 10;
                    const visK = kmag * visScale;
                    const visQ = Q.length() * visScale;
                    // k_in: drawn ending at the atom (origin). So start = -kIn direction, length |k|.
                    const kInDir = kIn.clone().normalize();
                    aff_kInArrow.position.copy(kInDir.clone().multiplyScalar(-visK)).setZ(0.1);
                    aff_kInArrow.setDirection(kInDir);
                    aff_kInArrow.setLength(visK, Math.min(0.25, 0.25 * visK), 0.15);
                    // k_out: starts at atom, points along kOut, length visK
                    const kOutDir = kOut.clone().normalize();
                    aff_kOutArrow.position.set(0, 0, 0.1);
                    aff_kOutArrow.setDirection(kOutDir);
                    aff_kOutArrow.setLength(visK, Math.min(0.25, 0.25 * visK), 0.15);
                    // Q: also starts at atom (showing Q = k_out - k_in as a vector from the origin)
                    aff_qArrow.position.set(0, 0, 0.1);
                    if (visQ < 1e-3) {
                        aff_qArrow.setLength(0.001, 0, 0);
                    } else {
                        aff_qArrow.setDirection(Q.clone().normalize());
                        aff_qArrow.setLength(visQ, Math.min(0.25, 0.25 * visQ), 0.15);
                    }
                    // f(Q) graph
                    drawAffGraph();
                    // --- Phasor diagram ---
                    // Single mode: Z phasors each with phase Q·r_i where r_i samples the cloud.
                    //   We deterministically place Z electrons inside the Gaussian to keep the display stable,
                    //   showing how individual contributions dephase as Q grows.
                    // Two mode: two phasors of length f(Q), at phases ±(Q·d)/2 (so their sum's magnitude is 2f|cos(Q·d/2)|).
                    drawAffKVectorPhasor(Q);
                    // Numeric readout
                    const readout = document.getElementById('aff-readout');
                    if (readout) {
                        const Qmag = Q.length();
                        const f = aff_singleAtomFormFactor(Qmag, a, Z);
                        if (waveParams.aff_mode === 'single') {
                            readout.innerHTML =
                                `|Q| = <b>${Qmag.toFixed(3)}</b><br>` +
                                `f(Q) = <b>${f.toFixed(3)}</b>  (out of Z=${Z})<br>` +
                                `|f|² = <b>${(f*f).toFixed(3)}</b>`;
                        } else {
                            const d_vec = new THREE.Vector3(
                                waveParams.aff_atomDistance * Math.cos(waveParams.aff_atomPairAngle),
                                waveParams.aff_atomDistance * Math.sin(waveParams.aff_atomPairAngle), 0);
                            const Qd = Q.dot(d_vec);
                            const F2 = f * f * 2 * (1 + Math.cos(Qd));
                            readout.innerHTML =
                                `|Q| = <b>${Qmag.toFixed(3)}</b>, &nbsp; Q·d = <b>${Qd.toFixed(3)}</b><br>` +
                                `f(Q) = <b>${f.toFixed(3)}</b><br>` +
                                `|F(Q)|² = 2 f² (1+cos Q·d) = <b>${F2.toFixed(3)}</b><br>` +
                                `<span style="font-size:0.9em">Bragg condition: Q·d = 2πn</span>`;
                        }
                    }
                    break;
                }
            }
        }

        // Phasor diagram for single-atom mode: Z electron phasors at positions sampled from the cloud
        // Inset showing the scattering geometry as vectors: k_in (blue), k_out (green),
        // Q = k_out − k_in (red). Drawn tip-to-tail with a thin construction line so the
        // triangle relation is visually explicit. Used for both single- and two-atom modes.
        function drawAffKVectorPhasor(Q) {
            if (!phasorCtx) return;
            const w = phasorCanvas.width, h = phasorCanvas.height;
            const cx = w / 2, cy = h / 2 + 4;
            const maxR = Math.min(w / 2 - 8, h / 2 - 14);
            phasorCtx.clearRect(0, 0, w, h);
            // Title
            phasorCtx.fillStyle = '#cccccc';
            phasorCtx.font = '11px Arial';
            phasorCtx.textAlign = 'center';
            phasorCtx.fillText('Scattering geometry: Q = k_out − k_in', cx, 12);
            // k vectors in world units
            const kmag = waveParams.aff_k_in_mag;
            const kIn  = new THREE.Vector2( kmag * Math.cos(waveParams.aff_theta_in),  kmag * Math.sin(waveParams.aff_theta_in));
            const kOut = new THREE.Vector2( kmag * Math.cos(waveParams.aff_theta_out), kmag * Math.sin(waveParams.aff_theta_out));
            // Auto-zoom: scale so the longest of |k_in|, |k_out|, |Q| fits in the inset.
            // Q's magnitude can reach 2|k| (back-scatter), so account for it.
            const maxLen = Math.max(kmag, kmag, Q.length()) || 1;
            const scale = (maxR * 0.85) / maxLen;
            // Convert world (math) → screen: x stays, y flips (canvas y is down).
            // For all three vectors we draw from the origin (cx,cy).
            // Helper to draw an arrow at angle θ with length len (world units).
            function drawArrow(angle_rad, len_world, color, lineWidth) {
                const len = len_world * scale;
                const dx =  Math.cos(angle_rad) * len;
                const dy = -Math.sin(angle_rad) * len; // screen y-flip → CCW for positive angle
                phasorCtx.strokeStyle = color;
                phasorCtx.fillStyle = color;
                phasorCtx.lineWidth = lineWidth;
                phasorCtx.beginPath();
                phasorCtx.moveTo(cx, cy);
                phasorCtx.lineTo(cx + dx, cy + dy);
                phasorCtx.stroke();
                // Arrow head
                const ang = Math.atan2(dy, dx);
                const headLen = 9;
                phasorCtx.beginPath();
                phasorCtx.moveTo(cx + dx, cy + dy);
                phasorCtx.lineTo(cx + dx - headLen * Math.cos(ang - 0.35),
                                 cy + dy - headLen * Math.sin(ang - 0.35));
                phasorCtx.lineTo(cx + dx - headLen * Math.cos(ang + 0.35),
                                 cy + dy - headLen * Math.sin(ang + 0.35));
                phasorCtx.closePath();
                phasorCtx.fill();
            }
            // Construction triangle: draw k_in from origin, then add (−k_in) from k_out's tip,
            // which closes back to the origin. Equivalently: from the tip of k_in, draw a thin
            // line to the tip of k_out — that is Q. We'll instead show the cleaner "vectors from origin"
            // view, with a faint dashed construction line from k_in tip to k_out tip (= Q's geometry).
            // 1) Faint dashed line from k_in tip to k_out tip (length = |Q|, visualizes the relation)
            const kIn_dx  =  Math.cos(waveParams.aff_theta_in)  * kmag * scale;
            const kIn_dy  = -Math.sin(waveParams.aff_theta_in)  * kmag * scale;
            const kOut_dx =  Math.cos(waveParams.aff_theta_out) * kmag * scale;
            const kOut_dy = -Math.sin(waveParams.aff_theta_out) * kmag * scale;
            phasorCtx.strokeStyle = 'rgba(255,255,255,0.35)';
            phasorCtx.setLineDash([3, 3]);
            phasorCtx.lineWidth = 1;
            phasorCtx.beginPath();
            phasorCtx.moveTo(cx + kIn_dx, cy + kIn_dy);
            phasorCtx.lineTo(cx + kOut_dx, cy + kOut_dy);
            phasorCtx.stroke();
            phasorCtx.setLineDash([]);
            // 2) |k| reference circle (since |k_in| = |k_out| = kmag, both end on this circle).
            phasorCtx.strokeStyle = 'rgba(255,255,255,0.18)';
            phasorCtx.lineWidth = 1;
            phasorCtx.beginPath();
            phasorCtx.arc(cx, cy, kmag * scale, 0, 2 * Math.PI);
            phasorCtx.stroke();
            // 3) The three vectors from the origin
            drawArrow(waveParams.aff_theta_in,  kmag, '#3498db', 3);    // k_in (blue)
            drawArrow(waveParams.aff_theta_out, kmag, '#2ecc71', 3);    // k_out (green)
            // Q angle = atan2(Q.y, Q.x) but be careful with the screen y-flip in drawArrow
            // (drawArrow expects a *math* angle, and uses sin/cos directly with the y-flip).
            const Qang = Math.atan2(Q.y, Q.x);
            if (Q.length() > 1e-4) {
                drawArrow(Qang, Q.length(), '#ffffff', 3.5);             // Q (white)
            }
            // Origin dot
            phasorCtx.fillStyle = 'rgba(255,255,255,0.7)';
            phasorCtx.beginPath();
            phasorCtx.arc(cx, cy, 3, 0, 2 * Math.PI);
            phasorCtx.fill();
            // Labels at the tips
            phasorCtx.font = 'bold 10px Arial';
            phasorCtx.textAlign = 'left';
            phasorCtx.fillStyle = '#3498db';
            phasorCtx.fillText('k_in',  cx + kIn_dx + 4,  cy + kIn_dy);

        function createSingleWaveObject(color, opacity = 1) { const material = new THREE.LineBasicMaterial({ color: color, transparent: opacity < 1, opacity: opacity }); const geometry = new THREE.BufferGeometry(); const positions = new Float32Array(waveParams.points * 3); geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3)); return new THREE.Line(geometry, material); }
        function updateWaveGeometry(lineObject, wavelength, amplitude, phase, options = {}) { if (!lineObject) { return; } const positions = lineObject.geometry.attributes.position.array; if (wavelength <= 0.001) wavelength = 0.001; const k = (2 * Math.PI) / wavelength; for (let i = 0; i < waveParams.points; i++) { const x_base = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2); const x = x_base - (options.x_offset || 0); let currentAmplitude = amplitude; if(options.attenuation) { currentAmplitude *= Math.exp(-options.attenuation * Math.abs(x_base)); } let y = (options.isEnvelope) ? currentAmplitude * Math.cos(k * x + phase) : currentAmplitude * Math.sin(k * x + phase); positions[i * 3] = x_base; positions[i * 3 + 1] = y; positions[i * 3 + 2] = 0; } lineObject.geometry.attributes.position.needsUpdate = true; }
        
        function update3DWaveGeometry(lineObject, origin, direction, magnitude, wavelength, phase, numPoints = 100) {
            if (!lineObject) return;
            let positions = lineObject.geometry.attributes.position.array;
            if (!positions || positions.length !== numPoints * 3) {
                lineObject.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(numPoints * 3), 3));
                positions = lineObject.geometry.attributes.position.array;
            }
            
            const k = (2 * Math.PI) / wavelength;
            const tangent = direction.clone().normalize();
            
            let up = new THREE.Vector3(0, 0, 1);
            if (Math.abs(tangent.z) > 0.95) { up.set(0, 1, 0); }
            const perpendicular = new THREE.Vector3().crossVectors(tangent, up).normalize();
            
            const amplitude = 0.2;

            for (let i = 0; i < numPoints; i++) {
                const distanceAlongPath = (i / (numPoints - 1)) * magnitude;
                const pathPoint = origin.clone().addScaledVector(tangent, distanceAlongPath);
                const sineOffset = amplitude * Math.sin(k * distanceAlongPath + phase);
                const finalPoint = pathPoint.addScaledVector(perpendicular, sineOffset);
                
                positions[i * 3] = finalPoint.x;
                positions[i * 3 + 1] = finalPoint.y;
                positions[i * 3 + 2] = finalPoint.z;
            }
            lineObject.geometry.attributes.position.needsUpdate = true;
            lineObject.geometry.computeBoundingSphere();
        }

        function calculateWavePoint(x, k_val, omega_val, amplitude_val, time_val, initial_phase = 0) { return amplitude_val * Math.sin(k_val * x - omega_val * time_val + initial_phase); }
        function aspectVerticalFix(cam) { if (!cam || cam.top === cam.bottom || cam.right === cam.left) return 1; return (cam.right - cam.left) / (cam.top - cam.bottom); }

        // Build node/antinode marker spheres for standing waves
        function rebuildStandingMarkers() {
            // Remove old markers
            standingNodeMarkers.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            standingAntinodeMarkers.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            standingNodeMarkers = [];
            standingAntinodeMarkers = [];
            const L = waveParams.standingWavelength;
            // For sin(kx)cos(ωt)+sin(-kx)cos(...) → effectively 2A sin(kx) cos(ωt). Nodes at kx = nπ → x = nL/2.
            // Antinodes at kx = (n+1/2)π → x = (n+1/2) L/2.
            const nodeGeom = new THREE.SphereGeometry(0.08, 12, 8);
            const antinodeGeom = new THREE.SphereGeometry(0.1, 12, 8);
            const nodeMat = new THREE.MeshBasicMaterial({ color: 0xff5050 });
            const antinodeMat = new THREE.MeshBasicMaterial({ color: 0x50ff50 });
            const half = waveParams.extent / 2;
            for (let n = -20; n < 20; n++) {
                const xn = n * L / 2;
                if (xn < -half - 0.1 || xn > half + 0.1) continue;
                const node = new THREE.Mesh(nodeGeom.clone(), nodeMat.clone());
                node.position.set(xn, 0, 0.05);
                scene.add(node);
                standingNodeMarkers.push(node);
                const xa = (n + 0.5) * L / 2;
                if (xa < -half - 0.1 || xa > half + 0.1) continue;
                const anti = new THREE.Mesh(antinodeGeom.clone(), antinodeMat.clone());
                anti.position.set(xa, 0, 0.05);
                scene.add(anti);
                standingAntinodeMarkers.push(anti);
            }
        }

        // ===== Atomic form factor helpers =====
        // Build a sprite texture for a Gaussian-cloud atom of width a.
        // Returns a THREE.Sprite of world-size ~ 4a so the 1/e radius is well within the disc.
        function makeGaussianAtomSprite(a, Z) {
            const canvas = document.createElement('canvas');
            const size = 128;
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            const c = size / 2;
            const imgData = ctx.createImageData(size, size);
            const data = imgData.data;
            // Peak alpha scales with Z so more electrons → denser-looking cloud.
            // Z ranges 1..30 in the UI; map to alpha 0.25..1.0 at the center.
            const peakAlpha = Math.min(1, 0.2 + 0.8 * (Z / 30));
            // Gaussian falls as exp(-r²/a²) but here r is in "sprite radius" units. We map sprite radius=1 → r = 2a (so density at edge ≈ exp(-4) ≈ 0.018).
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = (px - c) / c; // -1 .. 1
                    const dy = (py - c) / c;
                    const r2 = dx*dx + dy*dy;     // 0..2 across sprite
                    if (r2 > 1) continue;          // outside disc → transparent
                    // r_physical / a == 2 * sqrt(r2)  (since edge of sprite == 2a). So exp(-r_phys²/a²) = exp(-4 r2)
                    const intensity = Math.exp(-4 * r2);
                    const idx = (py * size + px) * 4;
                    data[idx + 0] = 100;             // R
                    data[idx + 1] = 180;             // G
                    data[idx + 2] = 255;             // B (light blue cloud)
                    data[idx + 3] = Math.floor(255 * intensity * peakAlpha);
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            tex.needsUpdate = true;
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
            const sprite = new THREE.Sprite(mat);
            // Sprite world size: 4a (so visible cloud radius ~ 2a, matching where exp drops to ~e^-4)
            const worldSize = 4 * a;
            sprite.scale.set(worldSize, worldSize, 1);
            return sprite;
        }

        function disposeAffAtomSprite(sprite) {
            if (!sprite) return;
            scene.remove(sprite);
            if (sprite.material) {
                if (sprite.material.map) sprite.material.map.dispose();
                sprite.material.dispose();
            }
        }

        function rebuildAffAtoms() {
            disposeAffAtomSprite(aff_atom1);
            disposeAffAtomSprite(aff_atom2);
            aff_atom1 = null; aff_atom2 = null;
            if (aff_atomPairLine) {
                scene.remove(aff_atomPairLine);
                aff_atomPairLine.geometry.dispose();
                aff_atomPairLine.material.dispose();
                aff_atomPairLine = null;
            }
            if (currentConcept !== 'atomic_form_factor') return;
            const a = waveParams.aff_atomSize;
            const Z = waveParams.aff_Z;
            if (waveParams.aff_mode === 'single') {
                aff_atom1 = makeGaussianAtomSprite(a, Z);
                aff_atom1.position.set(0, 0, 0);
                scene.add(aff_atom1);
            } else {
                const d = waveParams.aff_atomDistance;
                const ang = waveParams.aff_atomPairAngle;
                const dx = (d / 2) * Math.cos(ang);
                const dy = (d / 2) * Math.sin(ang);
                aff_atom1 = makeGaussianAtomSprite(a, Z);
                aff_atom1.position.set(-dx, -dy, 0);
                scene.add(aff_atom1);
                aff_atom2 = makeGaussianAtomSprite(a, Z);
                aff_atom2.position.set( dx,  dy, 0);
                scene.add(aff_atom2);
                // Dashed line connecting the atoms
                const lineGeom = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-dx, -dy, 0.02),
                    new THREE.Vector3( dx,  dy, 0.02)
                ]);
                const lineMat = new THREE.LineDashedMaterial({ color: 0xaaaaaa, dashSize: 0.12, gapSize: 0.08 });
                aff_atomPairLine = new THREE.Line(lineGeom, lineMat);
                aff_atomPairLine.computeLineDistances();
                scene.add(aff_atomPairLine);
            }
        }

        // f(Q) for a Gaussian cloud of width a and Z electrons.
        function aff_singleAtomFormFactor(Q, a, Z) {
            return Z * Math.exp(-Q * Q * a * a / 4);
        }

        // Draw f(Q) (single-atom) or |F(Q)|² (two-atom) inset graph.
        function drawAffGraph() {
            if (!aff_graphCtx) return;
            const w = aff_graphCanvas.width, h = aff_graphCanvas.height;
            aff_graphCtx.clearRect(0, 0, w, h);
            const margin = { left: 30, right: 8, top: 18, bottom: 22 };
            const plotW = w - margin.left - margin.right;
            const plotH = h - margin.top - margin.bottom;
            const a = waveParams.aff_atomSize;
            const Z = waveParams.aff_Z;
            // Q range: show 0 .. Qmax where Qmax ≈ 2 |k_in| (the geometric max for elastic scattering)
            const Qmax = Math.max(6, 2 * waveParams.aff_k_in_mag);
            // Y axis: in single-atom mode, plot f(Q) from 0 to Z. In two-atom mode, plot |F|² from 0 to (2Z)² (max constructive).
            const isSingle = waveParams.aff_mode === 'single';
            const yMax = isSingle ? Z : (2 * Z) * (2 * Z);
            // Current Q value
            const Q_now = aff_currentQMagnitude();
            // Axes
            aff_graphCtx.strokeStyle = 'rgba(255,255,255,0.5)';
            aff_graphCtx.lineWidth = 1;
            aff_graphCtx.beginPath();
            aff_graphCtx.moveTo(margin.left, margin.top);
            aff_graphCtx.lineTo(margin.left, margin.top + plotH);
            aff_graphCtx.lineTo(margin.left + plotW, margin.top + plotH);
            aff_graphCtx.stroke();
            // X tick labels (0, Qmax/2, Qmax)
            aff_graphCtx.fillStyle = '#cccccc';
            aff_graphCtx.font = '10px Arial';
            aff_graphCtx.textAlign = 'center';
            for (const frac of [0, 0.5, 1]) {
                const x = margin.left + frac * plotW;
                aff_graphCtx.fillText((frac * Qmax).toFixed(1), x, margin.top + plotH + 12);
                aff_graphCtx.strokeStyle = 'rgba(255,255,255,0.15)';
                aff_graphCtx.beginPath();
                aff_graphCtx.moveTo(x, margin.top); aff_graphCtx.lineTo(x, margin.top + plotH);
                aff_graphCtx.stroke();
            }
            // Y tick labels (0, mid, max)
            aff_graphCtx.textAlign = 'right';
            for (const frac of [0, 0.5, 1]) {
                const y = margin.top + plotH - frac * plotH;
                aff_graphCtx.fillText((frac * yMax).toFixed(isSingle ? 1 : 0), margin.left - 4, y + 3);
            }
            // Axis labels
            aff_graphCtx.textAlign = 'center';
            aff_graphCtx.fillText('Q', margin.left + plotW / 2, h - 4);
            aff_graphCtx.save();
            aff_graphCtx.translate(10, margin.top + plotH / 2);
            aff_graphCtx.rotate(-Math.PI / 2);
            aff_graphCtx.fillText(isSingle ? 'f(Q)' : '|F(Q)|²', 0, 0);
            aff_graphCtx.restore();
            // Title
            aff_graphCtx.textAlign = 'center';
            aff_graphCtx.fillStyle = '#dddddd';
            aff_graphCtx.font = '11px Arial';
            aff_graphCtx.fillText(isSingle ? 'f(Q) = Z·exp(−Q²a²/4)' : '|F(Q)|² (atomic × structure)', margin.left + plotW / 2, 12);
            // Curve
            aff_graphCtx.strokeStyle = '#f1c40f';
            aff_graphCtx.lineWidth = 2;
            aff_graphCtx.beginPath();
            const N = 200;
            // For two-atom |F(Q)|² we average over the pair-axis component of Q because
            // we don't have a fixed orientation in the graph; better: plot |F(Q)|² along the
            // direction parallel to the pair axis (since that's where d·Q matters). We'll use
            // Q along the pair axis: |F|² = f(Q)² · 2 (1 + cos(Qd)).
            const d_dist = waveParams.aff_atomDistance;
            for (let i = 0; i <= N; i++) {
                const Q = (i / N) * Qmax;
                const f = aff_singleAtomFormFactor(Q, a, Z);
                let y;
                if (isSingle) {
                    y = f;
                } else {
                    // assume Q parallel to inter-atomic axis for the curve
                    y = f * f * 2 * (1 + Math.cos(Q * d_dist));
                }
                const px = margin.left + (i / N) * plotW;
                const py = margin.top + plotH - (y / yMax) * plotH;
                if (i === 0) aff_graphCtx.moveTo(px, py);
                else aff_graphCtx.lineTo(px, py);
            }
            aff_graphCtx.stroke();
            // Current-Q marker: vertical red line + dot on curve
            if (Q_now >= 0 && Q_now <= Qmax) {
                const xQ = margin.left + (Q_now / Qmax) * plotW;
                aff_graphCtx.strokeStyle = '#e74c3c';
                aff_graphCtx.lineWidth = 1;
                aff_graphCtx.beginPath();
                aff_graphCtx.moveTo(xQ, margin.top);
                aff_graphCtx.lineTo(xQ, margin.top + plotH);
                aff_graphCtx.stroke();
                // Value at this Q (using the SAME curve definition as above for consistency)
                const f = aff_singleAtomFormFactor(Q_now, a, Z);
                let yVal;
                if (isSingle) yVal = f;
                else yVal = f * f * 2 * (1 + Math.cos(Q_now * d_dist));
                const yClamped = Math.max(0, Math.min(yMax, yVal));
                const yQ = margin.top + plotH - (yClamped / yMax) * plotH;
                aff_graphCtx.fillStyle = '#e74c3c';
                aff_graphCtx.beginPath();
                aff_graphCtx.arc(xQ, yQ, 4, 0, 2 * Math.PI);
                aff_graphCtx.fill();
            }
        }

        // |Q| from current params
        function aff_currentQMagnitude() {
            const k = waveParams.aff_k_in_mag;
            const kIn  = new THREE.Vector2(k * Math.cos(waveParams.aff_theta_in),  k * Math.sin(waveParams.aff_theta_in));
            const kOut = new THREE.Vector2(k * Math.cos(waveParams.aff_theta_out), k * Math.sin(waveParams.aff_theta_out));
            return kOut.clone().sub(kIn).length();
        }

            aff_graphCtx = aff_graphCanvas.getContext('2d');
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x111827);
            axesHelper = new THREE.AxesHelper(waveParams.extent / 2); scene.add(axesHelper);
            // Faint background grid (helps students visually measure wavelengths)
            gridHelper = new THREE.GridHelper(waveParams.extent, waveParams.extent * 2, 0x2a3a5a, 0x1f2b45);
            gridHelper.rotation.x = Math.PI / 2; // Lie in XY plane
            gridHelper.position.z = -0.05;       // Behind the waves
            scene.add(gridHelper);
            const canvasElement = document.getElementById('webgl-canvas');
            const vizArea = document.getElementById('visualization-area');
            const initialWidth = vizArea.clientWidth; const initialHeight = vizArea.clientHeight;
            camera = new THREE.OrthographicCamera( waveParams.extent / -2, waveParams.extent / 2, (waveParams.extent * initialHeight / initialWidth) / 2, (waveParams.extent * initialHeight / initialWidth) / -2, 0.1, 1000 );
            camera.position.set(0, 0, 10); 
            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.setSize(initialWidth, initialHeight);
            renderer.localClippingEnabled = true;
            controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.dampingFactor = 0.05; controls.screenSpacePanning = true; 
            controls.target.set(0, 0, 0); controls.minZoom = 0.2; controls.maxZoom = 5; controls.update();
            conceptSelector = document.getElementById('concept-selector');
            conceptSelector.addEventListener('change', handleConceptChange);
            
            document.getElementById('footer-date').textContent = "NitaD, Univ Paris-Saclay, August 2, 2025, updated November 2025.";

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // --- HUD: play/pause, speed, reset view ---
            const playBtn = document.getElementById('hud-playpause');
            playBtn.addEventListener('click', () => {
                isPaused = !isPaused;
                playBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
            });
            const speedSlider = document.getElementById('hud-speed');
            const speedValue = document.getElementById('hud-speed-value');
            speedSlider.addEventListener('input', e => {
                timeSpeed = parseFloat(e.target.value);
                speedValue.textContent = timeSpeed.toFixed(2) + '×';
            });
            document.getElementById('hud-reset-view').addEventListener('click', resetCameraView);

            // Spacebar toggles play/pause
            window.addEventListener('keydown', e => {
                if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
                    e.preventDefault();
                    playBtn.click();
                }
            });

            resetScatteringObjects();
        
            setupConceptUI(currentConcept); 
            setupConceptVisualization(currentConcept); 
            window.addEventListener('resize', onWindowResize, false); 
            setupResizer();
            animate();
        }

        function resetCameraView() {
            if (!camera || !controls) return;
            if (camera.isOrthographicCamera) {
                camera.position.set(0, 0, 10);
                controls.target.set(0, 0, 0);
                const vizArea = document.getElementById('visualization-area');
                const aspect = vizArea.clientWidth / vizArea.clientHeight;
                camera.left = waveParams.extent / -2;
                camera.right = waveParams.extent / 2;
                camera.top = (waveParams.extent / aspect) / 2;
                camera.bottom = (waveParams.extent / aspect) / -2;
                camera.zoom = 1;
                camera.updateProjectionMatrix();
            } else {
                camera.position.set(8, 6, 15);
                controls.target.set(0, 0, 0);
            }
            controls.update();
            // Visible feedback so the user sees the button worked even when there was nothing to reset
            const btn = document.getElementById('hud-reset-view');
            if (btn) {
                const original = btn.style.backgroundColor;
                btn.style.backgroundColor = '#2ecc71';
                setTimeout(() => { btn.style.backgroundColor = original; }, 200);
            }
        }

        function handleConceptChange(event) {
            const newConcept = event.target.value;
            if (newConcept === currentConcept) return;
            clearConceptVisualization(currentConcept);
            animationTime = 0;
            currentConcept = newConcept;
            setupConceptUI(currentConcept);
            setupConceptVisualization(currentConcept);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isPaused) animationTime += 0.015 * timeSpeed;
            if (controls) controls.update();
            updateConceptVisualization(currentConcept);
            updateScales();
            renderer.render(scene, camera); 
        }

        function onWindowResize() {
            const vizArea = document.getElementById('visualization-area'); 
            const newWidth = vizArea.clientWidth; const newHeight = vizArea.clientHeight;
            if (newWidth > 0 && newHeight > 0) { 
                const aspect = newWidth / newHeight;
                if (camera.isOrthographicCamera) {
                    camera.left = waveParams.extent / -2; camera.right = waveParams.extent / 2; 
                    camera.top = (waveParams.extent / aspect) / 2; camera.bottom = (waveParams.extent / aspect) / -2; 
                } else { camera.aspect = aspect; }
                camera.updateProjectionMatrix();
                renderer.setSize(newWidth, newHeight); 
            } 
        }

        function worldToScreen(worldVector, camera, canvas) { const screenVector = worldVector.clone().project(camera); const x = Math.round((screenVector.x * 0.5 + 0.5) * canvas.clientWidth); const y = Math.round((-screenVector.y * 0.5 + 0.5) * canvas.clientHeight); return { x, y }; }
        function updateScales() { 
            if (!scaleContainerElement || !renderer || currentConcept === 'wave_scattering') { if(scaleContainerElement) scaleContainerElement.innerHTML = ''; return; } 
            while (scaleContainerElement.firstChild) scaleContainerElement.removeChild(scaleContainerElement.firstChild); 
            const canvas = renderer.domElement; 
            if (!canvas || canvas.clientWidth === 0 || canvas.clientHeight === 0) return; 
            let xAxisZeroScreenPos = null; 
            const xAxisYOffset = 30; 
            const numXTicks = 11; 
            const xMin = -waveParams.extent / 2; 
            for (let i = 0; i < numXTicks; i++) { 
                const value = xMin + i * (waveParams.extent / (numXTicks - 1)); 
                const worldPos = new THREE.Vector3(value, 0, 0); 
                const currentScreenPos = worldToScreen(worldPos, camera, canvas); 
                const projectedVecForCheck = worldPos.clone().project(camera); 
                if (Math.abs(projectedVecForCheck.x) > 1.1 || Math.abs(projectedVecForCheck.y) > 1.1) { 
                    if (!(Math.abs(value) < 0.001 && Math.abs(projectedVecForCheck.x) <= 1.1)) continue; 
                } 
                const label = document.createElement('span'); 
                label.classList.add('scale-label', 'x-axis-label'); 
                label.textContent = value.toFixed(Math.abs(value) < 0.01 && value !==0 ? 2 : 0); 
                label.style.left = `${currentScreenPos.x}px`; 
                label.style.top = `${currentScreenPos.y + xAxisYOffset}px`; 
                label.style.transform = 'translateX(-50%)'; 
                scaleContainerElement.appendChild(label); 
                if (Math.abs(value) < 0.001) xAxisZeroScreenPos = { x: currentScreenPos.x, y: currentScreenPos.y + xAxisYOffset }; 
            } 
            const yAxisXOffset = -20; 
            let amplitudeValues = []; 
            let displayAmplitude = waveParams.amplitude; 
            if (Math.abs(displayAmplitude) > 0.01) amplitudeValues.push(-displayAmplitude, displayAmplitude); 
            if (amplitudeValues.indexOf(0) === -1 || amplitudeValues.length === 0 || (amplitudeValues.length > 0 && Math.abs(displayAmplitude) > 0.01) ) amplitudeValues.push(0); 
            else if (amplitudeValues.length === 0 && Math.abs(displayAmplitude) < 0.01) amplitudeValues.push(0);  
            amplitudeValues.sort((a, b) => a - b); 
            const uniqueAmplitudeValues = [...new Set(amplitudeValues)]; 
            for (const value of uniqueAmplitudeValues) { 
                let skipLabel = false; 
                if (Math.abs(value) < 0.001 && xAxisZeroScreenPos) { 
                    const yZeroWorldPos = new THREE.Vector3(0, 0, 0); 
                    const yZeroScreenPos = worldToScreen(yZeroWorldPos, camera, canvas); 
                    const distBetweenZeros = Math.hypot( (yZeroScreenPos.x + yAxisXOffset) - xAxisZeroScreenPos.x,  yZeroScreenPos.y - (xAxisZeroScreenPos.y - xAxisYOffset)); 
                    if (distBetweenZeros < 25 && Math.abs(displayAmplitude) > 0.01) skipLabel = true; 
                } 
                if (skipLabel) continue; 
                const worldPos = new THREE.Vector3(0, value, 0); 
                const currentYScreenPos = worldToScreen(worldPos, camera, canvas); 
                const projectedVecForCheck = worldPos.clone().project(camera); 
                if (Math.abs(projectedVecForCheck.y) > 1.1 || Math.abs(projectedVecForCheck.x) > 1.1) { 
                    if (!(Math.abs(value) < 0.001 && Math.abs(projectedVecForCheck.y) <= 1.1)) continue; 
                } 
                const label = document.createElement('span'); 
                label.classList.add('scale-label', 'y-axis-label'); 
                label.textContent = value.toFixed(1); 
                label.style.left = `${currentYScreenPos.x + yAxisXOffset}px`; 
                label.style.top = `${currentYScreenPos.y}px`; 
                label.style.transform = 'translateY(-50%) translateX(-100%)'; 
                scaleContainerElement.appendChild(label); 
            } 
        }
        
        function setupResizer() {
            const resizer = document.getElementById('drag-handle'); const leftPanel = document.getElementById('controls-panel'); let isResizing = false;
            resizer.addEventListener('mousedown', function(e) { e.preventDefault(); isResizing = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', stopResize); });
            function handleMouseMove(e) { if (!isResizing) return; const container = resizer.parentElement; const newLeftWidth = e.clientX - container.getBoundingClientRect().left; const minWidth = parseFloat(getComputedStyle(leftPanel).minWidth); const maxWidth = parseFloat(getComputedStyle(leftPanel).maxWidth); if (newLeftWidth > minWidth && newLeftWidth < maxWidth) { leftPanel.style.width = `${newLeftWidth}px`; onWindowResize(); } }
            function stopResize() { isResizing = false; document.body.style.cursor = 'default'; document.body.style.userSelect = 'auto'; window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', stopResize); onWindowResize(); }
        }

        // --- Camera and Interaction ---
        function switchToPerspectiveCamera(pos = {x: 8, y: 6, z: 15}) {
             if (camera && camera.isPerspectiveCamera) { camera.position.set(pos.x, pos.y, pos.z); controls.target.set(0,0,0); controls.update(); return; }
             originalCameraState = { position: camera.position.clone(), target: controls.target.clone() };
             const vizArea = document.getElementById('visualization-area');
             camera = new THREE.PerspectiveCamera(50, vizArea.clientWidth / vizArea.clientHeight, 0.1, 1000);
             camera.position.set(pos.x, pos.y, pos.z);
             controls.object = camera; controls.target.set(0, 0, 0); controls.update();
        }
        function switchToOrthographicCamera() {
            if (camera && camera.isOrthographicCamera) { return; }
            if (!originalCameraState) { originalCameraState = { position: new THREE.Vector3(0,0,10), target: new THREE.Vector3(0,0,0)}; }
            const vizArea = document.getElementById('visualization-area');
            const aspect = vizArea.clientWidth / vizArea.clientHeight;
            camera = new THREE.OrthographicCamera(waveParams.extent / -2, waveParams.extent / 2, (waveParams.extent / aspect) / 2, (waveParams.extent / aspect) / -2, 0.1, 1000);
            camera.position.copy(originalCameraState.position);
            controls.object = camera; controls.target.copy(originalCameraState.target);
            axesHelper.visible = true;
            originalCameraState = null;
        }

        function onMouseDown(event) {
            // Reserved for future interactive concepts requiring drag interactions.
            // Currently no concept uses this, but the infrastructure is preserved.
            return;
        }

        function onMouseMove(event) {
            // Reserved for future interactive concepts requiring drag interactions.
            if (!draggedObject) return;
        }


        function onMouseUp(event) {
            if (draggedObject) {
                draggedObject = null;
                controls.enabled = true;
            }
        }

        // --- Phasor Diagram ---
        // --- Phasor Diagram ---
        function drawPhasorDiagram(phaseDiff, options = {}) {
            const {
                showResultant = true,
                color1 = '#ffaa00',
                color2 = '#00aaff',
                amp1 = 1.0,
                amp2 = 1.0
            } = options;

            if (!phasorCtx) return;
            const w = phasorCanvas.width; const h = phasorCanvas.height;
            const centerX = w / 2; const centerY = h / 2;
            const maxRadius = w / 2 - 30;

            phasorCtx.clearRect(0, 0, w, h);
            
            // --- Define the two base vectors ---
            // Note: HTML canvas y-axis points DOWN. To get the math convention
            // (positive φ → counter-clockwise rotation as seen on screen),
            // we draw with y flipped: screen_y = -math_y.
            // Length scale: the longer of (amp1+amp2) [if showing resultant] or max(amp1,amp2)
            // is mapped to maxRadius * 0.95 so the diagram fills the canvas.
            const denom = showResultant ? (amp1 + amp2) : Math.max(amp1, amp2);
            const unit = (denom > 0 ? (maxRadius * 0.95) / denom : maxRadius);
            const v1len = amp1 * unit;
            const v2len = amp2 * unit;
            const v1x = v1len;
            const v1y = 0;
            const v2x = v2len * Math.cos(phaseDiff);
            const v2y = -v2len * Math.sin(phaseDiff);

            // --- Draw Vector 1 ---
            phasorCtx.strokeStyle = color1; 
            phasorCtx.lineWidth = 2;
            phasorCtx.beginPath(); 
            phasorCtx.moveTo(centerX, centerY); 
            phasorCtx.lineTo(centerX + v1x, centerY + v1y); 
            phasorCtx.stroke();
            
            // --- Draw Vector 2 ---
            phasorCtx.strokeStyle = color2;
            phasorCtx.beginPath(); 
            phasorCtx.moveTo(centerX, centerY); 
            phasorCtx.lineTo(centerX + v2x, centerY + v2y); 
            phasorCtx.stroke();

            // --- Calculate and draw Resultant (white) ---
            if (showResultant) {
                const resultantX = v1x + v2x;
                const resultantY = v1y + v2y;
                phasorCtx.strokeStyle = '#ffffff'; 
                phasorCtx.lineWidth = 3;
                phasorCtx.beginPath();
                phasorCtx.moveTo(centerX, centerY);
                phasorCtx.lineTo(centerX + resultantX, centerY + resultantY);
                phasorCtx.stroke();
            }

            // --- Draw the phase difference arc and text ---
            if (Math.abs(phaseDiff) > 0.01) {
                const arcRadius = Math.min(v1len, v2len) * 0.5;
                phasorCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                phasorCtx.lineWidth = 1;
                phasorCtx.beginPath();
                // Arc drawn in screen coords: use the negated angle for the same
                // counter-clockwise math convention. The HTML canvas arc() uses
                // anticlockwise=true when the last arg is true; but since we
                // already flipped y for the vectors, drawing from -phaseDiff
                // (start at 0, end at -phaseDiff) traces the arc on the correct side.
                const startAngle = Math.min(0, -phaseDiff);
                const endAngle = Math.max(0, -phaseDiff);
                phasorCtx.arc(centerX, centerY, arcRadius, startAngle, endAngle);
                phasorCtx.stroke();

                // Add text for the angle
                const angleDeg = (phaseDiff * 180 / Math.PI).toFixed(0);
                // Text positioned in the middle of the arc, on the screen-flipped side
                const textAngle = -phaseDiff / 2;
                const textRadius = arcRadius + 15;
                const textX = centerX + textRadius * Math.cos(textAngle);
                const textY = centerY + textRadius * Math.sin(textAngle);

                phasorCtx.fillStyle = '#cccccc';
                phasorCtx.font = '14px Arial';
                phasorCtx.textAlign = 'center';
                phasorCtx.textBaseline = 'middle';
                phasorCtx.fillText(`${angleDeg}°`, textX, textY);
            }
        }


        // --- Polar dipole radiation pattern (sin²θ) for wave scattering ---
        // Drawn in 2D as a textbook-style polar diagram.
        function drawPolarDipole(polarizationType) {
            if (!polarCtx) return;
            const w = polarCanvas.width, h = polarCanvas.height;
            const cx = w / 2, cy = h / 2;
            const R = Math.min(w, h) / 2 - 24;
            polarCtx.clearRect(0, 0, w, h);
            // Reference circles at r = 0.25, 0.5, 0.75, 1.0 with labels
            polarCtx.strokeStyle = 'rgba(255,255,255,0.18)';
            polarCtx.lineWidth = 1;
            polarCtx.fillStyle = 'rgba(180,180,180,0.7)';
            polarCtx.font = '9px Arial';
            polarCtx.textAlign = 'left';
            polarCtx.textBaseline = 'middle';
            const ringFractions = [0.25, 0.5, 0.75, 1.0];
            for (const frac of ringFractions) {
                polarCtx.beginPath();
                polarCtx.arc(cx, cy, R * frac, 0, 2 * Math.PI);
                polarCtx.stroke();
                // Label on the +x axis side
                polarCtx.fillText(frac.toFixed(2), cx + R * frac + 2, cy - 5);
            }
            // Axes with degree labels
            polarCtx.beginPath();
            polarCtx.moveTo(cx - R, cy); polarCtx.lineTo(cx + R, cy);
            polarCtx.moveTo(cx, cy - R); polarCtx.lineTo(cx, cy + R);
            polarCtx.stroke();
            polarCtx.textAlign = 'center';
            polarCtx.fillStyle = 'rgba(200,200,200,0.85)';
            polarCtx.font = '10px Arial';
            polarCtx.fillText('0°',   cx,        cy - R - 6);
            polarCtx.fillText('180°', cx,        cy + R + 10);
            polarCtx.textAlign = 'left';   polarCtx.fillText('90°', cx + R + 4, cy + 4);
            polarCtx.textAlign = 'right';  polarCtx.fillText('90°', cx - R - 4, cy + 4);
            // Pattern
            const isLinear = polarizationType.startsWith('linear');
            const dipoleAxisAngle = (polarizationType === 'linear_horizontal') ? 0 : Math.PI / 2;
            polarCtx.strokeStyle = '#ff8c00';
            polarCtx.fillStyle = 'rgba(255, 140, 0, 0.25)';
            polarCtx.lineWidth = 2;
            polarCtx.beginPath();
            const N = 180;
            for (let i = 0; i <= N; i++) {
                const phi = (i / N) * 2 * Math.PI;
                const theta = phi - dipoleAxisAngle;
                let r;
                if (isLinear) {
                    r = Math.sin(theta) * Math.sin(theta);
                } else {
                    r = 0.5 * (1 + Math.cos(theta) * Math.cos(theta));
                }
                const px = cx + R * r * Math.cos(phi);
                const py = cy - R * r * Math.sin(phi);
                if (i === 0) polarCtx.moveTo(px, py);
                else polarCtx.lineTo(px, py);
            }
            polarCtx.closePath();
            polarCtx.fill();
            polarCtx.stroke();
            // Dipole axis indicator (dashed)
            polarCtx.setLineDash([4, 3]);
            polarCtx.strokeStyle = 'rgba(255,255,255,0.5)';
            polarCtx.lineWidth = 1;
            polarCtx.beginPath();
            if (isLinear) {
                if (polarizationType === 'linear_horizontal') {
                    polarCtx.moveTo(cx - R, cy); polarCtx.lineTo(cx + R, cy);
                } else {
                    polarCtx.moveTo(cx, cy - R); polarCtx.lineTo(cx, cy + R);
                }
            }
            polarCtx.stroke();
            polarCtx.setLineDash([]);
            // Title
            polarCtx.fillStyle = '#cccccc';
            polarCtx.font = '11px Arial';
            polarCtx.textAlign = 'center';
            polarCtx.textBaseline = 'middle';
            const title = isLinear ? 'Pattern: sin²θ  (θ from dipole axis)' : '½(1 + cos²θ)  unpolarized';
            polarCtx.fillText(title, cx, 10);
        }


        document.addEventListener('DOMContentLoaded', init);
    </script>
