<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveXplorer - Integrated</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --accent-color: #0056b3; /* Primary color for title and interactive elements */
            --border-color: #e0e0e0; /* Consistent color for borders and inactive tracks */
        }

        body {
            font-family: system-ui, sans-serif; margin: 0; background-color: #f0f0f0; color: #333; display: flex; height: 100vh; overflow: hidden;
        }
        #app-container {
            display: flex; background-color: #ffffff; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); border-radius: 12px;
            overflow: hidden; width: 98%; max-width: 1800px; height: 92vh; margin: 2vh auto;
        }
        #controls-panel {
            width: 320px; min-width: 240px; max-width: 600px; flex-shrink: 0; padding: 15px;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }
        #drag-handle {
            width: 5px; cursor: col-resize; background-color: var(--border-color);
            flex-shrink: 0; transition: background-color 0.2s;
        }
        #drag-handle:hover {
            background-color: var(--accent-color);
        }
        #visualization-area {
            flex-grow: 1; position: relative; background-color: #111827; min-width: 0;
        }
        #controls-panel h1 {
            font-size: 1.5em; margin-top: 0; margin-bottom: 20px; color: var(--accent-color);
        }
        #webgl-canvas {
            display: block; width: 100%; height: 100%;
        }
        .control-group { margin-bottom: 22px; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .control-group select,
        .control-group input[type="number"].value-input {
            width: 100%; padding: 10px; border-radius: 5px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        .control-group input[type="number"].value-input { text-align: right; }
        .slider-group { display: flex; align-items: center; gap: 10px; }
        .slider-group input[type="range"] {
            flex-grow: 1; -webkit-appearance: none; appearance: none;
            height: 8px; background: var(--border-color);
            border-radius: 5px; outline: none; opacity: 0.8; transition: opacity .2s;
        }
        .slider-group input[type="range"]:hover { opacity: 1; }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            background: var(--accent-color);
            cursor: pointer; border-radius: 50%;
        }
        .slider-group input[type="range"]::-moz-range-thumb {
            width: 20px; height: 20px;
            background: var(--accent-color);
            cursor: pointer; border-radius: 50%;
        }
        .radio-group label { font-weight: normal; margin-right: 15px; }
        .radio-options-container div { margin-bottom: 8px; }
        .radio-options-container input[type="radio"] {
            accent-color: var(--accent-color);
        }
        .param-info {
            padding: 10px; border-radius: 5px; border: 1px solid var(--border-color);
            background-color: #f0f0f0; font-size: 0.9em; margin-top: 4px;
            color: #555; text-align: center;
        }


        footer {
            position: fixed; left: 0; bottom: 0; width: 100%;
            background-color: #f8f9fa; color: #555; text-align: left;
            padding: 8px 12px; font-size: 0.8em; border-top: 1px solid #e0e0e0; z-index: 100;
        }


        #scale-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; font-family: Arial, sans-serif;
            font-size: 12px; color: #b0b0b0;
        }
        .scale-label {
            position: absolute; background-color: rgba(17, 24, 39, 0.7);
            padding: 2px 4px; border-radius: 3px;
            pointer-events: auto; white-space: nowrap;
            user-select: none; -webkit-user-select: none; -ms-user-select: none;
        }
        
        #phasor-canvas {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 240px;
            height: 180px;
            background-color: rgba(20, 30, 50, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: none; /* Hidden by default */
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 28px; }
        .switch .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* HUD overlay: play/pause, speed, reset, time */
        #hud-bar {
            position: absolute; top: 15px; left: 15px;
            display: flex; align-items: center; gap: 10px;
            background-color: rgba(20, 30, 50, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #d0d0d0;
            user-select: none;
            z-index: 10;
        }
        #hud-bar button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, sans-serif;
        }
        #hud-bar button:hover { opacity: 0.85; }
        #hud-bar input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 80px; height: 4px;
            background: var(--border-color);
            border-radius: 3px; outline: none;
        }
        #hud-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
            background: var(--accent-color); cursor: pointer; border-radius: 50%;
        }
        #hud-bar input[type="range"]::-moz-range-thumb {
            width: 12px; height: 12px;
            background: var(--accent-color); cursor: pointer; border-radius: 50%;
        }
        #hud-bar .hud-sep { width: 1px; height: 18px; background: var(--border-color); }

        /* Polar plot inset (used by wave_scattering) */
        #polar-canvas {
            position: absolute;
            top: 15px; right: 15px;
            width: 200px; height: 200px;
            background-color: rgba(20, 30, 50, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: none;
        }
        /* Atomic-form-factor inset: f(Q) curve (used alongside phasor) */
        #aff-graph-canvas {
            position: absolute;
            top: 210px; right: 15px;   /* directly under the phasor canvas (top:15 + height:180 + 15 gap) */
            width: 240px; height: 180px;
            background-color: rgba(20, 30, 50, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: none;
        }

    </style>
</head>
<body>

    <div id="app-container">
        <div id="controls-panel">
            <h1>WaveXplorer</h1>
             <div class="control-group">
                <label for="concept-selector">Concept:</label>
                <select id="concept-selector">
                    <option value="wavelength_amplitude">Wavelength & Amplitude</option>
                    <option value="phase">Phase (Phase Shift)</option>
                    <option value="interference">Interference</option>
                    <option value="beats">Beats</option>
                    <option value="standing_waves">Standing Waves</option>
                    <option value="attenuation">Attenuation (Damping)</option>
                    <option value="reflection_transmission">Reflection & Transmission</option>
                    <option value="snell">Refraction (Snell's Law)</option>
                    <option value="polarization">Polarization</option>
                    <option value="poynting_vector">Poynting Vector</option>
                    <option value="phase_group_velocity">Phase/Group Velocity</option>
                    <option value="wave_type_comparison">Wave Type (Comparison)</option>
                    <option value="wavefront">Wavefront</option>
                    <option value="wave_scattering">Wave Scattering</option>
                    <option value="atomic_form_factor">Atomic Form Factor (Diffraction)</option>
                </select>
            </div>
            <div id="parameter-controls">
                </div>
        </div>
        <div id="drag-handle"></div>
        <div id="visualization-area">
            <canvas id="webgl-canvas"></canvas>
            <canvas id="phasor-canvas" width="240" height="180"></canvas> <!-- Phasor diagram (phase concept, atomic form factor) -->
            <canvas id="polar-canvas" width="200" height="200"></canvas> <!-- Dipole polar pattern (scattering) -->
            <canvas id="aff-graph-canvas" width="240" height="180"></canvas> <!-- f(Q) plot for atomic form factor -->
            <div id="hud-bar">
                <button id="hud-playpause" title="Play/Pause (Space)">⏸ Pause</button>
                <span class="hud-sep"></span>
                <span>Speed</span>
                <input type="range" id="hud-speed" min="0" max="2" step="0.05" value="1">
                <span id="hud-speed-value">1.0×</span>
                <span class="hud-sep"></span>
                <button id="hud-reset-view" title="Reset camera zoom/pan">⟳ Reset zoom</button>
            </div>
            <div id="scale-container"></div>
        </div>
    </div>

    <footer id="footer-date"></footer>
    
    <script>
        let scene, camera, renderer;
        let axesHelper;
        let gridHelper;
        let controls; 
        let scaleContainerElement;
        let parameterControlsContainer; 
        let animationTime = 0;
        let isPaused = false;
        let timeSpeed = 1.0;
        let polarCanvas, polarCtx;
        let phasorCanvas, phasorCtx;
        let raycaster, mouse;
        let draggedObject = null;
        const omegaAnimation = Math.PI / 1.5; 
        let currentConcept = 'wavelength_amplitude'; 
        let conceptSelector;
        let originalCameraState = null;

        // --- Visualization objects ---
        let waveLine1, waveLine2; 
        let wavelengthIndicatorViz, phaseShiftIndicatorViz;
        let animatedEVector, eVectorTracePath;
        let polarizationHelixPath; // NEW: helix path connecting arrow tips in spatial polarization
        let spatialPolarizationEVectors = []; 
        let poyntingArrowViz;
        let phaseMarkerViz, groupMarkerViz; 
        let groupWaveComp1, groupWaveComp2, groupWaveSuperposition, groupWaveEnvelopeUpper, groupWaveEnvelopeLower; 
        let particleSystemViz = []; 
        let wavefrontObjects = []; 
        let interferenceSuperposition, standingWaveFwd, standingWaveBwd, standingWaveResult, dopplerSourceViz;
        // NEW: extra visualization objects for new features
        let standingNodeMarkers = [], standingAntinodeMarkers = [];
        let attenuationEnvelopeUpper, attenuationEnvelopeLower;
        let dopplerObserverLeft, dopplerObserverRight;
        let reflectionWaveIncident, reflectionWaveReflected, reflectionWaveTransmitted;
        let reflectionInterfaceLine;
        let beatsWave1, beatsWave2, beatsSuperposition, beatsEnvelopeUpper, beatsEnvelopeLower;
        let snellIncidentRay, snellRefractedRay, snellReflectedRay, snellInterfaceLine, snellNormalLine;
        // Atomic form factor visualization objects
        let aff_atom1, aff_atom2;
        let aff_kInArrow, aff_kOutArrow, aff_qArrow;
        let aff_atomPairLine;
        let aff_graphCanvas, aff_graphCtx; // f(Q) inset

        // --- Parameters for all concepts ---
        const waveParams = { 
            wavelength: 2.0, amplitude: 1.0, points: 500, extent: 10,  phaseShift: 0,
            polarizationType: 'linear_vertical', polarizationViewMode: 'temporal', Ey_amplitude: 1.0, Ez_amplitude: 0.5, 
            packet_delta_k_factor: 0.15, dispersionFactor: 0.1, poyntingShow: true, velocityDisplayType: 'phase', 
            waveComparisonType: 'transverse', wavefrontType: 'plane', particleCount: 30,
            interferenceSeparation: 2.0, interferenceWavelength: 2.5, interferenceAmplitude: 1.0,
            standingWavelength: 4.0, standingAmplitude: 1.0,
            attenuationFactor: 0.2, sourceVelocity: 0.5,
            // Reflection & transmission
            n1: 1.0, n2: 1.5,
            // Beats
            beatFreq1: 1.0, beatFreq2: 1.15,
            // Snell
            snellTheta_i: Math.PI / 6, snellN1: 1.0, snellN2: 1.5,
            // Atomic form factor (diffraction)
            aff_mode: 'single',         // 'single' or 'two'
            aff_atomSize: 0.5,          // Gaussian width a (electron cloud)
            aff_Z: 12,                   // electrons per atom
            aff_k_in_mag: 4.0,           // |k_in|
            aff_theta_in: 0,             // incident direction angle (0 = +x)
            aff_theta_out: Math.PI / 4,  // outgoing direction angle
            aff_atomDistance: 2.0,       // inter-atomic distance in 2-atom mode
            aff_atomPairAngle: 0,        // orientation of inter-atomic axis
        };

        // --- Wave Scattering ---
        let scatteringViz = {};
        let scatteringParams = {};
        



        function resetScatteringObjects() {
            scatteringViz = {
                particle: null,
                incomingWave: { planes: [], vectors: [], polarizationAngles: [], passedParticle: [] },
                radiatedWave: { shells: [] },
                lights: [], axes: null, lastEmittedCycle: -1, nextShellIndex: 0, lastParticleAngle: 0
            };
            scatteringParams = {
                numPlanes: 5, waveSpeed: 2.5, oscillationFrequency: 2.0, baseAmplitude: 1.0, sceneExtent: 12, particleMass: 1, particleCharge: 1,
                polarizationType: 'linear_vertical', showRadiatedWave: true, numRadiatedShells: 10, shellMaxAge: 5.0,
                vectorsPerCycle: 12, wavelength: 0, showSection: false, showWavefront: true,
            };
            scatteringParams.wavelength = scatteringParams.waveSpeed / scatteringParams.oscillationFrequency * (2 * Math.PI);
        }



        // --- SCATTERING CONCEPT: Helper functions ---
        function createScatteringParticle() {
            const geometry = new THREE.SphereGeometry(0.25, 32, 16);
            const material = new THREE.MeshPhongMaterial({ color: 0x0055ff, emissive: 0x3377ff });
            scatteringViz.particle = new THREE.Mesh(geometry, material);
            scene.add(scatteringViz.particle);
        }

        function createScatteringWaves() {
            const planeGeom = new THREE.PlaneGeometry(scatteringParams.sceneExtent * 1.5, scatteringParams.sceneExtent * 1.5);
            const planeMat = new THREE.MeshBasicMaterial({ color: 0x3498DB, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            for (let i = 0; i < scatteringParams.numPlanes; i++) {
                const plane = new THREE.Mesh(planeGeom, planeMat.clone());
                plane.rotation.y = Math.PI / 2;
                scene.add(plane);
                scatteringViz.incomingWave.planes.push(plane);
                scatteringViz.incomingWave.polarizationAngles.push(Math.random() * 2 * Math.PI);
                scatteringViz.incomingWave.passedParticle.push(false);
                const vectorsForPlane = [];
                for (let j = 0; j < scatteringParams.vectorsPerCycle; j++) {
                    const vector = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0,0,0), 1, 0xFFFF00, 0.4, 0.2);
                    scene.add(vector);
                    vectorsForPlane.push(vector);
                }
                scatteringViz.incomingWave.vectors.push(vectorsForPlane);
            }
            // Wireframe material for radiated shells — clearer view of the dipole pattern shape
            // than a solid filled torus, especially when shells overlap.
            const radiatedMat = new THREE.MeshBasicMaterial({
                color: 0xff8c00,
                wireframe: true,
                transparent: true,
                opacity: 0.85
            });
            const sphereGeom = new THREE.SphereGeometry(1, 24, 16);
            const points = [];
            const profileSegments = 32;
            for (let i = 0; i <= profileSegments; i++) {
                const theta = (i / profileSegments) * Math.PI;
                points.push(new THREE.Vector2(Math.pow(Math.sin(theta), 2), Math.sin(theta) * Math.cos(theta)));
            }
            // Reduce lathe segments slightly for cleaner wireframe lines
            const dipoleGeom = new THREE.LatheGeometry(points, 24);
            for (let i = 0; i < scatteringParams.numRadiatedShells; i++) {
                const shell = {
                    sphere: new THREE.Mesh(sphereGeom.clone(), radiatedMat.clone()),
                    torus: new THREE.Mesh(dipoleGeom.clone(), radiatedMat.clone()),
                    isActive: false, birthTime: 0,
                    orientationAngle: 0,
                    clippingPlane: new THREE.Plane(new THREE.Vector3(0, 1, 0), 0),
                };
                shell.sphere.visible = false; shell.torus.visible = false;
                scene.add(shell.sphere); scene.add(shell.torus);
                scatteringViz.radiatedWave.shells.push(shell);
            }
        }

        function emitScatteringPulse(currentPhase) {
            const currentCycle = Math.floor((currentPhase / Math.PI) - 0.5);
            if (currentCycle > scatteringViz.lastEmittedCycle) {
                scatteringViz.lastEmittedCycle = currentCycle;
                const shell = scatteringViz.radiatedWave.shells[scatteringViz.nextShellIndex];
                shell.isActive = true; shell.birthTime = animationTime;
                shell.orientationAngle = scatteringViz.lastParticleAngle || 0;
                const isPeakEmission = currentCycle % 2 === 0;
                const targetColor = isPeakEmission ? 0xFFFF00 : 0xE74C3C;
                shell.torus.material.color.set(targetColor); shell.torus.material.emissive.set(targetColor);
                shell.sphere.material.color.set(targetColor); shell.sphere.material.emissive.set(targetColor);
                scatteringViz.nextShellIndex = (scatteringViz.nextShellIndex + 1) % scatteringParams.numRadiatedShells;
            }
        }

        function updateRadiatedScatteringWave(currentAmplitude) {
            const isLinear = scatteringParams.polarizationType.startsWith('linear') || scatteringParams.polarizationType === 'non_polarized';
            const show = scatteringParams.showRadiatedWave && scatteringParams.particleCharge !== 0;
            const amplitudeScale = Math.min(1, currentAmplitude / scatteringParams.baseAmplitude);
            scatteringViz.radiatedWave.shells.forEach(shell => {
                if (!shell.isActive || !show) { shell.sphere.visible = false; shell.torus.visible = false; return; }
                shell.sphere.visible = !isLinear; shell.torus.visible = isLinear;
                const age = animationTime - shell.birthTime;
                if (age > scatteringParams.shellMaxAge) { shell.isActive = false; return; }
                const scale = age * scatteringParams.waveSpeed;
                const opacity = (2.0 * amplitudeScale) / (1 + scale * scale);
                if (isLinear) {
                    if (scatteringParams.polarizationType === 'non_polarized') {
                        shell.torus.rotation.set(shell.orientationAngle, 0, 0);
                    } else {
                        shell.torus.rotation.set(scatteringParams.polarizationType === 'linear_vertical' ? 0 : Math.PI / 2, 0, 0);
                    }
                    const torusMat = shell.torus.material;
                    if (scatteringParams.showSection) {
                        torusMat.wireframe = true;
                        const plane = shell.clippingPlane; plane.normal.set(-1, 0, 0); plane.constant = 0;
                        torusMat.clippingPlanes = [plane];
                    } else {
                        torusMat.wireframe = false; torusMat.clippingPlanes = null;
                    }
                    shell.torus.scale.setScalar(scale); shell.torus.material.opacity = opacity;
                } else {
                    shell.sphere.scale.setScalar(scale); shell.sphere.material.opacity = opacity;
                }
            });
        }
        

        // --- UI AND VISUALIZATION SETUP ---
        function connectSliderAndNumberInput(sliderId, numberId, paramName, isFloat, updateFn, paramObject = waveParams) {
            const slider = document.getElementById(sliderId);
            const numberInput = document.getElementById(numberId);
            if (!slider || !numberInput) return;

            const updateValue = (newValue) => {
                const value = isFloat ? parseFloat(newValue) : parseInt(newValue, 10);
                const min = parseFloat(slider.min); const max = parseFloat(slider.max);
                if (isNaN(value)) return;
                let clampedValue = Math.max(min, Math.min(max, value));
                paramObject[paramName] = clampedValue;
                if(document.activeElement !== slider) slider.value = clampedValue;
                if(document.activeElement !== numberInput) numberInput.value = isFloat ? clampedValue.toFixed(2) : clampedValue;
                if (paramName === 'phaseShift') {
                    const phaseDeg = (clampedValue * 180 / Math.PI).toFixed(0);
                     if(document.getElementById('phase-deg-value')) document.getElementById('phase-deg-value').textContent = ` (${phaseDeg}°)`;
                }
                if (paramName === 'scatteringAngle') {
                     const angleDeg = (clampedValue * 180 / Math.PI).toFixed(0);
                     if(document.getElementById('angle-deg-value')) document.getElementById('angle-deg-value').textContent = ` (${angleDeg}°)`;
                }
                if (updateFn) updateFn(currentConcept);
            };

            slider.addEventListener('input', e => updateValue(e.target.value));
            numberInput.addEventListener('change', e => updateValue(e.target.value));
        }

        function setupConceptUI(concept) {
            parameterControlsContainer.innerHTML = ''; // Clear previous controls

            switch (concept) {
                case 'wavelength_amplitude': {
                    const wlMin = 0.2, wlMax = 3.0, wlStep = 0.01;
                    const ampMin = 0.1, ampMax = 3.0, ampStep = 0.05;
                    parameterControlsContainer.innerHTML = `
                        <div class="control-group">
                            <label for="wavelength-slider">Wavelength (λ)</label>
                            <div class="slider-group">
                                <input type="range" id="wavelength-slider" min="${wlMin}" max="${wlMax}" step="${wlStep}" value="${waveParams.wavelength}">
                            </div>
                            <input type="number" class="value-input" id="wavelength-value" min="${wlMin}" max="${wlMax}" step="${wlStep}" value="${waveParams.wavelength.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="amplitude-slider">Amplitude (A)</label>
                            <div class="slider-group">
                                <input type="range" id="amplitude-slider" min="${ampMin}" max="${ampMax}" step="${ampStep}" value="${waveParams.amplitude}">
                            </div>
                            <input type="number" class="value-input" id="amplitude-value" min="${ampMin}" max="${ampMax}" step="${ampStep}" value="${waveParams.amplitude.toFixed(2)}" style="margin-top: 8px;">
                        </div>`;
                    connectSliderAndNumberInput('wavelength-slider', 'wavelength-value', 'wavelength', true, updateConceptVisualization);
                    connectSliderAndNumberInput('amplitude-slider', 'amplitude-value', 'amplitude', true, updateConceptVisualization);
                    break;
                }

                case 'phase': {
                    const phaseMin = 0, phaseMax = 2 * Math.PI, phaseStep = 0.01;
                    // Per-wave amplitudes (Phase concept owns these; default to 1 if unset)
                    if (typeof waveParams.phaseAmp1 !== 'number') waveParams.phaseAmp1 = 1.0;
                    if (typeof waveParams.phaseAmp2 !== 'number') waveParams.phaseAmp2 = 1.0;
                    waveParams.wavelength = 2.0;
                    parameterControlsContainer.innerHTML = `
                        <div class="control-group">
                            <label for="phase-slider">Phase Shift (ϕ)<span id="phase-deg-value"> (${(waveParams.phaseShift * 180 / Math.PI).toFixed(0)}°)</span></label>
                            <div class="slider-group">
                                <input type="range" id="phase-slider" min="${phaseMin}" max="${phaseMax.toFixed(4)}" step="${phaseStep}" value="${waveParams.phaseShift.toFixed(4)}">
                            </div>
                            <input type="number" class="value-input" id="phase-value" min="${phaseMin}" max="${phaseMax.toFixed(4)}" step="${phaseStep}" value="${waveParams.phaseShift.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="phase-amp1-slider"><span style="color:#3498db">Amplitude A₁ (reference)</span></label>
                            <div class="slider-group">
                                <input type="range" id="phase-amp1-slider" min="0.1" max="2" step="0.05" value="${waveParams.phaseAmp1}">
                            </div>
                            <input type="number" class="value-input" id="phase-amp1-value" min="0.1" max="2" step="0.05" value="${waveParams.phaseAmp1.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="phase-amp2-slider"><span style="color:#e67e22">Amplitude A₂ (shifted)</span></label>
                            <div class="slider-group">
                                <input type="range" id="phase-amp2-slider" min="0.1" max="2" step="0.05" value="${waveParams.phaseAmp2}">
                            </div>
                            <input type="number" class="value-input" id="phase-amp2-value" min="0.1" max="2" step="0.05" value="${waveParams.phaseAmp2.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="param-info" style="font-size:0.95em; text-align: left; line-height:1.5; margin-top: 10px;">
                            The cyan arrow at the bottom of the waves indicates the spatial shift between them, which corresponds to the phase angle in the phasor diagram.
                        </div>

                            <label for="snell-n1-slider">Index n₁ (top)</label>
                            <div class="slider-group"><input type="range" id="snell-n1-slider" min="1" max="3" step="0.05" value="${waveParams.snellN1}"></div>
                            <input type="number" class="value-input" id="snell-n1-value" min="1" max="3" step="0.05" value="${waveParams.snellN1.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="snell-n2-slider">Index n₂ (bottom)</label>
                            <div class="slider-group"><input type="range" id="snell-n2-slider" min="1" max="3" step="0.05" value="${waveParams.snellN2}"></div>
                            <input type="number" class="value-input" id="snell-n2-value" min="1" max="3" step="0.05" value="${waveParams.snellN2.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div id="snell-readout" class="param-info" style="margin-top: 8px;"></div>`;
                    const updateThetaLabel = () => {
                        const el = document.getElementById('snell-theta-deg');
                        if (el) el.textContent = `(${(waveParams.snellTheta_i * 180 / Math.PI).toFixed(0)}°)`;
                    };
                    connectSliderAndNumberInput('snell-theta-slider', 'snell-theta-value', 'snellTheta_i', true, updateThetaLabel);
                    connectSliderAndNumberInput('snell-n1-slider', 'snell-n1-value', 'snellN1', true);
                    connectSliderAndNumberInput('snell-n2-slider', 'snell-n2-value', 'snellN2', true);
                    updateThetaLabel();
                    break;
                }

                case 'atomic_form_factor': {
                    const isSingle = (waveParams.aff_mode === 'single');
                    parameterControlsContainer.innerHTML = `
                        <div class="control-group radio-group"><label>Mode:</label>
                            <div class="radio-options-container">
                                <div><label><input type="radio" name="aff_mode" value="single" ${isSingle ? 'checked' : ''}> Single atom — f(Q)</label></div>
                                <div><label><input type="radio" name="aff_mode" value="two" ${!isSingle ? 'checked' : ''}> Two atoms — |F(Q)|²</label></div>
                            </div>
                        </div>
                        <div class="control-group">
                            <label for="aff-a-slider">Atom size a (Gaussian width)</label>
                            <div class="slider-group"><input type="range" id="aff-a-slider" min="0.1" max="1.5" step="0.02" value="${waveParams.aff_atomSize}"></div>
                            <input type="number" class="value-input" id="aff-a-value" min="0.1" max="1.5" step="0.02" value="${waveParams.aff_atomSize.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="aff-z-slider">Electrons per atom Z</label>
                            <div class="slider-group"><input type="range" id="aff-z-slider" min="1" max="30" step="1" value="${waveParams.aff_Z}"></div>
                            <input type="number" class="value-input" id="aff-z-value" min="1" max="30" step="1" value="${waveParams.aff_Z}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="aff-kin-slider">|k_in| (wavevector magnitude)</label>
                            <div class="slider-group"><input type="range" id="aff-kin-slider" min="0.5" max="10" step="0.1" value="${waveParams.aff_k_in_mag}"></div>
                            <input type="number" class="value-input" id="aff-kin-value" min="0.5" max="10" step="0.1" value="${waveParams.aff_k_in_mag.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="aff-thin-slider">Incident direction θ_in (deg) <span id="aff-thin-deg"></span></label>
                            <div class="slider-group"><input type="range" id="aff-thin-slider" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_theta_in}"></div>
                            <input type="number" class="value-input" id="aff-thin-value" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_theta_in.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div class="control-group">
                            <label for="aff-thout-slider">Scattered direction θ_out (deg) <span id="aff-thout-deg"></span></label>
                            <div class="slider-group"><input type="range" id="aff-thout-slider" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_theta_out}"></div>
                            <input type="number" class="value-input" id="aff-thout-value" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_theta_out.toFixed(2)}" style="margin-top: 8px;">
                        </div>
                        <div id="aff-two-controls" style="display:${isSingle ? 'none' : 'block'};">
                            <div class="control-group">
                                <label for="aff-d-slider">Inter-atomic distance d</label>
                                <div class="slider-group"><input type="range" id="aff-d-slider" min="0.5" max="6" step="0.05" value="${waveParams.aff_atomDistance}"></div>
                                <input type="number" class="value-input" id="aff-d-value" min="0.5" max="6" step="0.05" value="${waveParams.aff_atomDistance.toFixed(2)}" style="margin-top: 8px;">
                            </div>
                            <div class="control-group">
                                <label for="aff-pair-angle-slider">Pair orientation (deg) <span id="aff-pair-deg"></span></label>
                                <div class="slider-group"><input type="range" id="aff-pair-angle-slider" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_atomPairAngle}"></div>
                                <input type="number" class="value-input" id="aff-pair-angle-value" min="-3.1416" max="3.1416" step="0.01" value="${waveParams.aff_atomPairAngle.toFixed(2)}" style="margin-top: 8px;">
                            </div>
                        </div>
                        <div class="param-info" style="text-align:left; margin-top:8px;">
                            <b>Elastic scattering:</b> |k_out| = |k_in|.<br>
                            <span style="color:#3498db">→</span> k_in &nbsp;
                            <span style="color:#2ecc71">→</span> k_out &nbsp;
                            <span style="color:#e74c3c">→</span> Q = k_out − k_in<br>
                            <span style="font-size:0.9em;">In 2-atom mode the arrows are drawn at the pair midpoint (origin). The incident plane wave illuminates both atoms; phase differences come from the path difference Q·d.</span><br>
                            <b>Form factor</b> = Fourier transform of the electron density:<br>
                            f(Q) = ∫ρ(r) e<sup>iQ·r</sup> d³r<br>
                            For ρ(r) ∝ exp(−r²/a²) ⟹ <b>f(Q) = Z · exp(−Q²a²/4)</b><br>
                            <span style="font-size:0.95em;">(Q small → forward scattering, f ≈ Z; large Q → cloud "averages out", f → 0.)</span>
                        </div>
                        <div id="aff-readout" class="param-info" style="margin-top: 8px;"></div>`;
                    // Wire controls
                    document.getElementsByName('aff_mode').forEach(el => el.addEventListener('change', e => {
                        waveParams.aff_mode = e.target.value;
                        document.getElementById('aff-two-controls').style.display =
                            (waveParams.aff_mode === 'single') ? 'none' : 'block';
                        rebuildAffAtoms();
                    }));
                    const updateThInLabel = () => { const el = document.getElementById('aff-thin-deg'); if (el) el.textContent = `(${(waveParams.aff_theta_in*180/Math.PI).toFixed(0)}°)`; };
                    const updateThOutLabel = () => { const el = document.getElementById('aff-thout-deg'); if (el) el.textContent = `(${(waveParams.aff_theta_out*180/Math.PI).toFixed(0)}°)`; };
                    const updatePairLabel = () => { const el = document.getElementById('aff-pair-deg'); if (el) el.textContent = `(${(waveParams.aff_atomPairAngle*180/Math.PI).toFixed(0)}°)`; };
                    connectSliderAndNumberInput('aff-a-slider',           'aff-a-value',           'aff_atomSize',     true, () => rebuildAffAtoms());
                    connectSliderAndNumberInput('aff-z-slider',           'aff-z-value',           'aff_Z',            true, () => rebuildAffAtoms());
                    connectSliderAndNumberInput('aff-kin-slider',         'aff-kin-value',         'aff_k_in_mag',     true);
                    connectSliderAndNumberInput('aff-thin-slider',        'aff-thin-value',        'aff_theta_in',     true, updateThInLabel);
                    connectSliderAndNumberInput('aff-thout-slider',       'aff-thout-value',       'aff_theta_out',    true, updateThOutLabel);
                    connectSliderAndNumberInput('aff-d-slider',           'aff-d-value',           'aff_atomDistance', true, () => rebuildAffAtoms());
                    connectSliderAndNumberInput('aff-pair-angle-slider',  'aff-pair-angle-value',  'aff_atomPairAngle',true, () => { rebuildAffAtoms(); updatePairLabel(); });
                    updateThInLabel(); updateThOutLabel(); updatePairLabel();
                    break;
                }

                default: {
                    parameterControlsContainer.innerHTML = '<p style="text-align:center; padding:10px;">Concept not implemented.</p>';
                    break;
                }
            }
            updateScales();
        }

function setupConceptVisualization(concept) {
            switch (concept) {
                case 'wavelength_amplitude': {
                    waveLine1 = createSingleWaveObject(0x2ecc71);
                    scene.add(waveLine1);
                    wavelengthIndicatorViz = new THREE.Group();
                    const indicatorMat = new THREE.LineBasicMaterial({
                        color: 0xff00ff
                    });
                    const mainBarGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(1, 0, 0)]);
                    const capGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -0.1, 0), new THREE.Vector3(0, 0.1, 0)]);
                    wavelengthIndicatorViz.add(new THREE.Line(mainBarGeom, indicatorMat));
                    wavelengthIndicatorViz.add(new THREE.Line(capGeom.clone(), indicatorMat));
                    wavelengthIndicatorViz.add(new THREE.Line(capGeom.clone(), indicatorMat));
                    scene.add(wavelengthIndicatorViz);
                    updateConceptVisualization(currentConcept);
                    break;
                }
                case 'phase': {
                    phasorCanvas.style.display = 'block';
                    waveLine1 = createSingleWaveObject(0x3498db, 0.6);
                    scene.add(waveLine1);
                    waveLine2 = createSingleWaveObject(0xe67e22);
                    scene.add(waveLine2);
                    phaseShiftIndicatorViz = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, -0.2, 0.1), 0, 0x00ffff, 0.2, 0.1);
                    scene.add(phaseShiftIndicatorViz);
                    updateConceptVisualization(currentConcept);
                    break;
                }
                case 'interference': {
                    waveLine1 = createSingleWaveObject(0x3498db, 0.6);
                    scene.add(waveLine1);
                    waveLine2 = createSingleWaveObject(0xe67e22, 0.6);
                    scene.add(waveLine2);
                    interferenceSuperposition = createSingleWaveObject(0xffffff, 1.0);
                    scene.add(interferenceSuperposition);
                    break;
                }
                case 'standing_waves': {
                    standingWaveFwd = createSingleWaveObject(0x3498db, 0.6);
                    scene.add(standingWaveFwd);
                    standingWaveBwd = createSingleWaveObject(0xe67e22, 0.6);
                    scene.add(standingWaveBwd);
                    standingWaveResult = createSingleWaveObject(0xffffff, 1.0);
                    scene.add(standingWaveResult);
                    rebuildStandingMarkers();
                    break;
                }
                case 'attenuation': {
                    waveLine1 = createSingleWaveObject(0x1abc9c);
                    scene.add(waveLine1);
                    // Faint dashed-looking envelope ±A₀ exp(−α|x|)
                    attenuationEnvelopeUpper = createSingleWaveObject(0xe74c3c, 0.6);
                    attenuationEnvelopeLower = createSingleWaveObject(0xe74c3c, 0.6);
                    scene.add(attenuationEnvelopeUpper);
                    scene.add(attenuationEnvelopeLower);
                    break;
                }
                case 'doppler_effect': {
                    waveLine1 = createSingleWaveObject(0x1abc9c);
                    scene.add(waveLine1);
                    const sourceGeom = new THREE.SphereGeometry(0.15, 16, 12);
                    const sourceMat = new THREE.MeshBasicMaterial({
                        color: 0xf1c40f
                    });
                    dopplerSourceViz = new THREE.Mesh(sourceGeom, sourceMat);
                    scene.add(dopplerSourceViz);
                    // Observers (left and right of the scene)
                    const obsGeom = new THREE.SphereGeometry(0.12, 12, 8);
                    dopplerObserverLeft = new THREE.Mesh(obsGeom.clone(), new THREE.MeshBasicMaterial({ color: 0xe74c3c }));
                    dopplerObserverLeft.position.set(-waveParams.extent / 2 + 0.4, -0.6, 0);
                    scene.add(dopplerObserverLeft);
                    dopplerObserverRight = new THREE.Mesh(obsGeom.clone(), new THREE.MeshBasicMaterial({ color: 0x2ecc71 }));
                    dopplerObserverRight.position.set(waveParams.extent / 2 - 0.4, -0.6, 0);
                    scene.add(dopplerObserverRight);
                    animationTime = -5;
                    break;
                }
                case 'polarization': {
                    animationTime = 0;
                    if (waveParams.polarizationViewMode === 'temporal') {
                        waveLine1 = createSingleWaveObject(0xaaaaaa, 0.4);
                        scene.add(waveLine1);
                        const E_amp_temp = waveParams.amplitude;
                        animatedEVector = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), E_amp_temp, 0xffff00, 0.25 * E_amp_temp, 0.15 * E_amp_temp);
                        scene.add(animatedEVector);
                        const traceMaterial = new THREE.LineBasicMaterial({
                            color: 0xffffff,
                            transparent: true,
                            opacity: 0.7
                        });
                        const tracePointsCount = 100;
                        const tracePositions = new Float32Array(tracePointsCount * 3);
                        let initialEy, initialEz;
                        const temp_A_trace = (waveParams.polarizationType === 'elliptical' && waveParams.Ey_amplitude !== undefined) ? waveParams.Ey_amplitude : E_amp_temp;
                        const temp_B_trace = (waveParams.polarizationType === 'elliptical' && waveParams.Ez_amplitude !== undefined) ? waveParams.Ez_amplitude : E_amp_temp;
                        switch (waveParams.polarizationType) {
                            case 'linear_vertical':
                                initialEy = temp_A_trace * Math.cos(0);
                                initialEz = 0;
                                break;
                            case 'linear_horizontal':
                                initialEy = 0;
                                initialEz = temp_A_trace * Math.cos(0);
                                break;
                            case 'circular_right_expected':
                                initialEy = temp_A_trace * Math.cos(0);
                                initialEz = -temp_A_trace * Math.sin(0);
                                break;
                            case 'circular_left_expected':
                                initialEy = temp_A_trace * Math.cos(0);
                                initialEz = temp_A_trace * Math.sin(0);
                                break;
                            case 'elliptical':
                                initialEy = temp_A_trace * Math.cos(0);
                                initialEz = temp_B_trace * Math.sin(0);
                                break;
                            case 'unpolarized':
                                initialEy = temp_A_trace;
                                initialEz = 0;
                                break;
                            default:
                                initialEy = temp_A_trace;
                                initialEz = 0;
                        }
                        for (let i = 0; i < tracePointsCount; ++i) {
                            tracePositions[i * 3] = initialEy;
                            tracePositions[i * 3 + 1] = initialEz;
                            tracePositions[i * 3 + 2] = 0;
                        }
                        const traceGeometry = new THREE.BufferGeometry();
                        traceGeometry.setAttribute('position', new THREE.BufferAttribute(tracePositions, 3));
                        traceGeometry.setDrawRange(0, 1);
                        eVectorTracePath = new THREE.Line(traceGeometry, traceMaterial);
                        eVectorTracePath.userData = {
                            pathLength: tracePointsCount,
                            drawnPoints: 1
                        };
                        scene.add(eVectorTracePath);
                    } else {
                        const arrowColor = 0xffff00;
                        const numberOfArrows = 25;
                        const arrowSpacing = waveParams.extent / (numberOfArrows > 1 ? (numberOfArrows - 1) : 1);
                        for (let i = 0; i < numberOfArrows; i++) {
                            const xPos = -waveParams.extent / 2 + i * arrowSpacing;
                            const origin = new THREE.Vector3(xPos, 0, 0);
                            const arrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), origin, 1, arrowColor, 0.3, 0.2);
                            if (waveParams.polarizationType === 'unpolarized') arrow.userData.randomAngleSpatial = Math.random() * 2 * Math.PI;
                            spatialPolarizationEVectors.push(arrow);
                            scene.add(arrow);
                        }
                        // Helix path: connects arrow tips, shown for circular/elliptical.
                        const helixPolarizationTypes = ['circular_right_expected', 'circular_left_expected', 'elliptical'];
                        if (helixPolarizationTypes.includes(waveParams.polarizationType)) {
                            const helixGeom = new THREE.BufferGeometry();
                            const helixPoints = 200;
                            helixGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(helixPoints * 3), 3));
                            const helixMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
                            polarizationHelixPath = new THREE.Line(helixGeom, helixMat);
                            polarizationHelixPath.userData = { points: helixPoints };
                            scene.add(polarizationHelixPath);
                        }
                    }
                    updateConceptVisualization(currentConcept);
                    break;
                }
                case 'poynting_vector': {
                    waveLine1 = createSingleWaveObject(0x3498db, 0.8);
                    scene.add(waveLine1);
                    updateWaveGeometry(waveLine1, waveParams.wavelength, waveParams.amplitude, 0);
                    poyntingArrowViz = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), 1.5, 0xffff00, 0.3, 0.15);
                    scene.add(poyntingArrowViz);
                    updateConceptVisualization(currentConcept);
                    break;
                }
                case 'phase_group_velocity': {
                    const baseAmp = waveParams.amplitude;
                    const baseLambda = waveParams.wavelength;
                    if (waveParams.velocityDisplayType === 'phase') {
                        waveLine1 = createSingleWaveObject(0x1abc9c);
                        scene.add(waveLine1);
                        updateWaveGeometry(waveLine1, baseLambda, baseAmp, 0);
                        const markerGeom = new THREE.SphereGeometry(0.15, 12, 8);
                        const markerMat = new THREE.MeshBasicMaterial({
                            color: 0xf1c40f
                        });
                        phaseMarkerViz = new THREE.Mesh(markerGeom, markerMat);
                        scene.add(phaseMarkerViz);
                    } else {
                        groupWaveComp1 = createSingleWaveObject(0x3498db, 0.5);
                        scene.add(groupWaveComp1);
                        groupWaveComp2 = createSingleWaveObject(0x9b59b6, 0.5);
                        scene.add(groupWaveComp2);
                        groupWaveSuperposition = createSingleWaveObject(0xffffff, 0.9);
                        scene.add(groupWaveSuperposition);
                        groupWaveEnvelopeUpper = createSingleWaveObject(0xe74c3c, 0.8);
                        scene.add(groupWaveEnvelopeUpper);
                        groupWaveEnvelopeLower = createSingleWaveObject(0xe74c3c, 0.8);
                        scene.add(groupWaveEnvelopeLower);
                        const markerGeomPhase = new THREE.SphereGeometry(0.1, 10, 6);
                        const markerMatPhase = new THREE.MeshBasicMaterial({
                            color: 0xf1c40f
                        });
                        phaseMarkerViz = new THREE.Mesh(markerGeomPhase, markerMatPhase);
                        scene.add(phaseMarkerViz);
                        const markerGeomGroup = new THREE.SphereGeometry(0.12, 10, 6);
                        const markerMatGroup = new THREE.MeshBasicMaterial({
                            color: 'cyan'
                        });
                        groupMarkerViz = new THREE.Mesh(markerGeomGroup, markerMatGroup);
                        scene.add(groupMarkerViz);
                    }
                    animationTime = 0;
                    updateConceptVisualization(currentConcept);
                    break;
                }
                case 'wave_type_comparison': {
                    const particleMat = new THREE.MeshBasicMaterial({
                        color: 0xffffff
                    });
                    const particleGeom = new THREE.SphereGeometry(0.08, 16, 12);
                    for (let i = 0; i < waveParams.particleCount; i++) {
                        const xPos = -waveParams.extent / 2 + i * (waveParams.extent / (waveParams.particleCount > 1 ? (waveParams.particleCount - 1) : 1));
                        const particle = new THREE.Mesh(particleGeom.clone(), particleMat.clone());
                        particle.userData.initialX = xPos;
                        particle.position.set(xPos, 0, 0);
                        particleSystemViz.push(particle);
                        scene.add(particle);
                    }
                    animationTime = 0;
                    break;
                }
                case 'wavefront': {
                    const wfMat = new THREE.MeshBasicMaterial({
                        color: 0x1abc9c,
                        transparent: true,
                        opacity: 0.4,
                        side: THREE.DoubleSide
                    });
                    const numFronts = 7;
                    const planeSize = waveParams.extent / aspectVerticalFix(camera) * 0.8;
                    if (waveParams.wavefrontType === 'plane') {
                        const planeGeom = new THREE.PlaneGeometry(planeSize, planeSize);
                        for (let i = 0; i < numFronts; i++) {
                            const plane = new THREE.Mesh(planeGeom, wfMat.clone());
                            plane.rotation.y = Math.PI / 2;
                            plane.userData.initialX = -waveParams.extent / 2 - i * 1.5;
                            plane.position.x = plane.userData.initialX;
                            wavefrontObjects.push(plane);
                            scene.add(plane);
                        }
                    } else {
                        const sphereGeom = new THREE.SphereGeometry(1, 32, 16);
                        for (let i = 0; i < numFronts - 2; i++) {
                            const sphere = new THREE.Mesh(sphereGeom, wfMat.clone());
                            sphere.material.wireframe = false;
                            sphere.userData.currentRadius = 0.1 + i * 1.2;
                            sphere.scale.setScalar(sphere.userData.currentRadius);
                            wavefrontObjects.push(sphere);
                            scene.add(sphere);
                        }
                    }
                    animationTime = 0;
                    if (controls) {
                        camera.position.set(4, 3, 8);
                        controls.target.set(-2, 0, 0);
                        controls.update();
                    }
                    break;
                }
                case 'wave_scattering': {
                    switchToPerspectiveCamera();
                    axesHelper.visible = false;
                    if (gridHelper) gridHelper.visible = false;
                    if (polarCanvas) polarCanvas.style.display = 'block';
                    scatteringViz.lights.push(new THREE.AmbientLight(0xffffff, 0.6));
                    scatteringViz.lights.push(new THREE.DirectionalLight(0xffffff, 0.8));
                    scatteringViz.lights.forEach(l => scene.add(l));
                    scatteringViz.axes = new THREE.AxesHelper(scatteringParams.sceneExtent / 2);
                    scene.add(scatteringViz.axes);
                    createScatteringParticle();
                    createScatteringWaves();
                    break;
                }
                case 'reflection_transmission': {
                    reflectionWaveIncident = createSingleWaveObject(0x3498db, 0.7);
                    reflectionWaveReflected = createSingleWaveObject(0xe67e22, 0.7);
                    reflectionWaveTransmitted = createSingleWaveObject(0x2ecc71, 1.0);
                    reflectionWaveTransmitted.position.z = 0.05; // draw on top
                    waveLine1 = createSingleWaveObject(0xffffff, 0.85); // resultant on left only
                    scene.add(reflectionWaveIncident);
                    scene.add(reflectionWaveReflected);
                    scene.add(reflectionWaveTransmitted);
                    scene.add(waveLine1);
                    // Shaded background regions to mark the two media
                    const halfH = waveParams.extent; // tall enough to fill the visible viewport
                    const leftMedium = new THREE.Mesh(
                        new THREE.PlaneGeometry(waveParams.extent / 2, halfH),
                        new THREE.MeshBasicMaterial({ color: 0x1c3a5e, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
                    );
                    leftMedium.position.set(-waveParams.extent / 4, 0, -0.1);
                    scene.add(leftMedium);
                    const rightMedium = new THREE.Mesh(
                        new THREE.PlaneGeometry(waveParams.extent / 2, halfH),
                        new THREE.MeshBasicMaterial({ color: 0x3a1c5e, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
                    );
                    rightMedium.position.set(waveParams.extent / 4, 0, -0.1);
                    scene.add(rightMedium);
                    // Solid vertical interface line at x=0, full height
                    const interfaceGeom = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(0, -halfH / 2, 0.05), new THREE.Vector3(0, halfH / 2, 0.05)
                    ]);
                    const interfaceMat = new THREE.LineBasicMaterial({ color: 0xffffff });
                    reflectionInterfaceLine = new THREE.Line(interfaceGeom, interfaceMat);
                    scene.add(reflectionInterfaceLine);
                    // Stash the background meshes on the interface line for cleanup
                    reflectionInterfaceLine.userData.bgMeshes = [leftMedium, rightMedium];
                    break;
                }
                case 'beats': {
                    beatsWave1 = createSingleWaveObject(0x3498db, 0.5);
                    beatsWave2 = createSingleWaveObject(0x9b59b6, 0.5);
                    beatsSuperposition = createSingleWaveObject(0xffffff, 0.95);
                    beatsEnvelopeUpper = createSingleWaveObject(0xe74c3c, 0.8);
                    beatsEnvelopeLower = createSingleWaveObject(0xe74c3c, 0.8);
                    [beatsWave1, beatsWave2, beatsSuperposition, beatsEnvelopeUpper, beatsEnvelopeLower].forEach(o => scene.add(o));
                    break;
                }
                case 'snell': {
                    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                    const interfaceGeom = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(-waveParams.extent/2, 0, 0.05),
                        new THREE.Vector3(waveParams.extent/2, 0, 0.05)
                    ]);

        function updateConceptVisualization(concept) {
            let A = waveParams.amplitude;
            let L = waveParams.wavelength;

            if (L <= 0.001) k = (2 * Math.PI) / 0.001;
            const phaseOffset = -omegaAnimation * animationTime;

            switch (concept) {
                case 'wavelength_amplitude': {
                    if (waveLine1) updateWaveGeometry(waveLine1, L, A, phaseOffset);

                        const yPos = A + 0.3;
                        const peakBaseX = (Math.PI / 2 - phaseOffset) / k;
                        const n = Math.ceil((-waveParams.extent / 2 - peakBaseX) / L);
                        let xStart = peakBaseX + n * L;
                        let xEnd = xStart + L;
                        const mainBarPos = wavelengthIndicatorViz.children[0].geometry.attributes.position;
                        mainBarPos.setXYZ(0, xStart, yPos, 0.1);
                        mainBarPos.setXYZ(1, xEnd, yPos, 0.1);
                        mainBarPos.needsUpdate = true;
                        const cap1Pos = wavelengthIndicatorViz.children[1].geometry.attributes.position;
                        cap1Pos.setXYZ(0, xStart, yPos - 0.15, 0.1);
                        cap1Pos.setXYZ(1, xStart, yPos + 0.15, 0.1);

                        cap2Pos.setXYZ(0, xEnd, yPos - 0.15, 0.1);
                        cap2Pos.setXYZ(1, xEnd, yPos + 0.15, 0.1);
                        cap2Pos.needsUpdate = true;
                        wavelengthIndicatorViz.visible = xEnd < (waveParams.extent / 2 + L);
                    }
                    break;
                }
                case 'phase': {
                    const A1 = waveParams.phaseAmp1 || 1.0;
                    const A2 = waveParams.phaseAmp2 || 1.0;
                    L = 2.0;
                    k = (2 * Math.PI) / L;
                    if (waveLine1) updateWaveGeometry(waveLine1, L, A1, phaseOffset);
                    if (waveLine2) updateWaveGeometry(waveLine2, L, A2, waveParams.phaseShift + phaseOffset);
                    if (phaseShiftIndicatorViz) {
                        const spatialShift = -waveParams.phaseShift / k;
                        if (Math.abs(spatialShift) < 0.01) {
                            phaseShiftIndicatorViz.visible = false;
                        } else {
                            phaseShiftIndicatorViz.visible = true;
                            const direction = new THREE.Vector3(Math.sign(spatialShift), 0, 0);
                            const length = Math.abs(spatialShift);
                            phaseShiftIndicatorViz.position.set(0, -0.2, 0.1);
                            phaseShiftIndicatorViz.setDirection(direction);
                            phaseShiftIndicatorViz.setLength(length, 0.2, 0.1);

                    }
                    drawPhasorDiagram(waveParams.phaseShift, {
                        showResultant: true,
                        color1: '#3498db',
                        color2: '#e67e22',

                        amp2: A2
                    });

                    const sumAmpInfo = document.getElementById('sum-amplitude-info');
                    if (sumAmpInfo) {
                        // |A1·e^{i·0} + A2·e^{iφ}| = sqrt(A1² + A2² + 2·A1·A2·cos φ)
                        const sumAmplitude = Math.sqrt(A1*A1 + A2*A2 + 2*A1*A2*Math.cos(waveParams.phaseShift));
                        sumAmpInfo.textContent = `Sum Amplitude: ${sumAmplitude.toFixed(2)}`;
                    }
                    break;
                }
                case 'interference': {
                    if (!waveLine1 || !waveLine2 || !interferenceSuperposition) return;
                    A = waveParams.interferenceAmplitude;
                    L = waveParams.interferenceWavelength;
                    const sep = waveParams.interferenceSeparation / 2;
                    updateWaveGeometry(waveLine1, L, A, phaseOffset, {
                        x_offset: -sep
                    });
                    updateWaveGeometry(waveLine2, L, A, phaseOffset, {
                        x_offset: sep
                    });
                    const pos1 = waveLine1.geometry.attributes.position.array;
                    const pos2 = waveLine2.geometry.attributes.position.array;
                    const superPos = interferenceSuperposition.geometry.attributes.position.array;
                    for (let i = 0; i < waveParams.points; i++) {

                        superPos[i * 3 + 1] = pos1[i * 3 + 1] + pos2[i * 3 + 1];
                        superPos[i * 3 + 2] = 0;
                    }
                    interferenceSuperposition.geometry.attributes.position.needsUpdate = true;
                    // Path-difference info: between sources, Δd ≈ separation, and Δd/λ tells (de)constructive
                    const info = document.getElementById('interf-pathdiff-info');
                    if (info) {
                        const ratio = waveParams.interferenceSeparation / L;
                        let nature = 'mixed';
                        const fractional = Math.abs(ratio - Math.round(ratio));
                        if (fractional < 0.05) nature = '≈ constructive (integer λ)';
                        else if (Math.abs(fractional - 0.5) < 0.05) nature = '≈ destructive (half-integer λ)';

                }
                case 'standing_waves': {
                    if (!standingWaveFwd || !standingWaveBwd || !standingWaveResult) return;
                    A = waveParams.standingAmplitude;
                    L = waveParams.standingWavelength;
                    updateWaveGeometry(standingWaveFwd, L, A, phaseOffset);
                    updateWaveGeometry(standingWaveBwd, L, A, -phaseOffset);
                    const pos1 = standingWaveFwd.geometry.attributes.position.array;
                    const pos2 = standingWaveBwd.geometry.attributes.position.array;
                    const resultPos = standingWaveResult.geometry.attributes.position.array;
                    for (let i = 0; i < waveParams.points; i++) {
                        resultPos[i * 3] = pos1[i * 3];
                        resultPos[i * 3 + 1] = pos1[i * 3 + 1] + pos2[i * 3 + 1];

                case 'attenuation': {
                    if (!waveLine1) return;

                    // Draw the analytic envelope ±A₀ e^{-α|x|} as static smooth curves
                    if (attenuationEnvelopeUpper && attenuationEnvelopeLower) {
                        const posU = attenuationEnvelopeUpper.geometry.attributes.position.array;
                        const posL = attenuationEnvelopeLower.geometry.attributes.position.array;
                        for (let i = 0; i < waveParams.points; i++) {
                            const x = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2);
                            const env = A * Math.exp(-waveParams.attenuationFactor * Math.abs(x));
                            posU[i * 3] = x; posU[i * 3 + 1] = env; posU[i * 3 + 2] = 0;
                            posL[i * 3] = x; posL[i * 3 + 1] = -env; posL[i * 3 + 2] = 0;

                        attenuationEnvelopeLower.geometry.attributes.position.needsUpdate = true;

                    break;
                }
                case 'doppler_effect': {
                    if (!waveLine1 || !dopplerSourceViz) return;
                    const waveSpeed = 3.0;
                    const sourceSpeed = waveParams.sourceVelocity * waveSpeed;
                    const sourceX = -waveParams.extent * 0.75 + ((animationTime * sourceSpeed) % (waveParams.extent * 1.5));
                    dopplerSourceViz.position.x = sourceX;
                    const L_behind = L * (waveSpeed + sourceSpeed) / waveSpeed;
                    const L_ahead = L * (waveSpeed - sourceSpeed) / waveSpeed;
                    const k_behind = (2 * Math.PI) / (L_behind || 0.001);
                    const k_ahead = (2 * Math.PI) / (L_ahead || 0.001);
                    const positions = waveLine1.geometry.attributes.position.array;
                    const omega_source = k * waveSpeed;
                    for (let i = 0; i < waveParams.points; i++) {
                        const x = (i / (waveParams.points - 1)) * waveParams.extent - (waveParams.extent / 2);
                        let y = (x < sourceX) ? A * Math.sin(k_behind * (x - sourceX) - omega_source * animationTime) : A * Math.sin(k_ahead * (x - sourceX) - omega_source * animationTime);
                        positions[i * 3] = x;
                        positions[i * 3 + 1] = y;
                    }
                    waveLine1.geometry.attributes.position.needsUpdate = true;
                    // Frequency readout: f_obs = c/λ_obs. f_source = c/L.
                    const info = document.getElementById('doppler-freq-info');
                    if (info) {
                        const f_source = waveSpeed / L;
                        // Left observer sees the "behind" wave (source moving right means sourceSpeed > 0,
                        // and the observer to the left is "behind" the source).
                        const f_left  = waveSpeed / (L_behind || 0.001);
                        const f_right = waveSpeed / (L_ahead  || 0.001);
                        info.innerHTML = `f₀ = <b>${f_source.toFixed(3)}</b><br>` +
                                         `<span style="color:#e74c3c">●</span> Left observer: f = <b>${f_left.toFixed(3)}</b> (${((f_left/f_source-1)*100).toFixed(0)}%)<br>` +
                                         `<span style="color:#2ecc71">●</span> Right observer: f = <b>${f_right.toFixed(3)}</b> (${((f_right/f_source-1)*100).toFixed(0)}%)`;
                    }
                    break;
                }
                case 'polarization': {
                    A = waveParams.amplitude;
                    L = waveParams.wavelength;
                    k = (2 * Math.PI) / L;
                    if (waveParams.polarizationViewMode === 'temporal') {
                        if (!animatedEVector || !eVectorTracePath || !waveLine1) return;
                        const guideWavePhase = -omegaAnimation * animationTime * 0.5;
                        updateWaveGeometry(waveLine1, L, A, guideWavePhase);
                        let Ey, Ez;
                        let Ay_t = (waveParams.polarizationType === 'elliptical' && waveParams.Ey_amplitude !== undefined) ? waveParams.Ey_amplitude : A;
                        let Az_t = (waveParams.polarizationType === 'elliptical' && waveParams.Ez_amplitude !== undefined) ? waveParams.Ez_amplitude : A;
                        if (waveParams.polarizationType === 'linear_horizontal') Ay_t = 0;
                        if (waveParams.polarizationType === 'linear_vertical') Az_t = 0;
                        switch (waveParams.polarizationType) {
                            case 'linear_vertical':
                                Ey = Ay_t * Math.cos(omegaAnimation * animationTime);
                                Ez = 0;
                                break;
                            case 'linear_horizontal':
                                Ey = 0;
                                Ez = Az_t * Math.cos(omegaAnimation * animationTime);
                                break;
                            case 'circular_right_expected':
                                Ey = Ay_t * Math.cos(omegaAnimation * animationTime);
                                Ez = -Ay_t * Math.sin(omegaAnimation * animationTime);
                                break;
                            case 'circular_left_expected':
                                Ey = Ay_t * Math.cos(omegaAnimation * animationTime);
                                Ez = Ay_t * Math.sin(omegaAnimation * animationTime);
                                break;
                            case 'elliptical':
                                Ey = Ay_t * Math.cos(omegaAnimation * animationTime);
                                Ez = Az_t * Math.sin(omegaAnimation * animationTime);
                                break;
                            case 'unpolarized':
                                if (animatedEVector && (animatedEVector.userData.randomAngle === undefined ||
                                    animationTime - (animatedEVector.userData.lastAngleUpdate || -1) > 0.1)) {
                                    animatedEVector.userData.randomAngle = Math.random() * 2 * Math.PI;
                                    animatedEVector.userData.lastAngleUpdate = animationTime;
                                }
                                const unpolarizedMag = A * Math.cos(omegaAnimation * animationTime * 3);
                                Ey = unpolarizedMag * Math.cos(animatedEVector ? animatedEVector.userData.randomAngle : 0);

                            default:

                        const direction = new THREE.Vector3(0, Ey, Ez);
                        const currentLength = direction.length();

                        if (currentLength < 0.001) {

                        animatedEVector.setDirection(direction);
                        const headL = Math.max(0.05, 0.25 * currentLength);
                        const headW = Math.max(0.025, 0.15 * currentLength);

                        const tracePositions = eVectorTracePath.geometry.attributes.position.array;

                        for (let i = pathLength - 1; i > 0; i--) {

                            tracePositions[i * 3 + 1] = tracePositions[(i - 1) * 3 + 1];
                            tracePositions[i * 3 + 2] = tracePositions[(i - 1) * 3 + 2];

                        tracePositions[0] = Ey;
                        tracePositions[1] = Ez;
                        tracePositions[2] = 0;
                        if (eVectorTracePath.userData.drawnPoints < pathLength) eVectorTracePath.userData.drawnPoints++;
                        eVectorTracePath.geometry.setDrawRange(0, eVectorTracePath.userData.drawnPoints);
                        eVectorTracePath.geometry.attributes.position.needsUpdate = true;
                    } else {
                        if (spatialPolarizationEVectors.length === 0) return;
                        const t_snapshot = 0;
                        let Ay_s_val = (waveParams.polarizationType === 'elliptical' && waveParams.Ey_amplitude !== undefined) ? waveParams.Ey_amplitude : A;
                        let Az_s_val = (waveParams.polarizationType === 'elliptical' && waveParams.Ez_amplitude !== undefined) ? waveParams.Ez_amplitude : A;
                        if (waveParams.polarizationType === 'linear_horizontal') Ay_s_val = 0;
                        if (waveParams.polarizationType === 'linear_vertical') Az_s_val = 0;
                        spatialPolarizationEVectors.forEach(arrow => {
                            const x_arrow = arrow.position.x;
                            let Ey, Ez;
                            switch (waveParams.polarizationType) {

                                    Ey = Ay_s_val * Math.cos(k * x_arrow - t_snapshot);

                                case 'linear_horizontal':
                                    Ey = 0;
                                    Ez = Az_s_val * Math.cos(k * x_arrow - t_snapshot);
                                    break;
                                case 'circular_right_expected':
                                    Ey = Ay_s_val * Math.cos(k * x_arrow - t_snapshot);
                                    Ez = -Ay_s_val * Math.sin(k * x_arrow - t_snapshot);
                                    break;
                                case 'circular_left_expected':
                                    Ey = Ay_s_val * Math.cos(k * x_arrow - t_snapshot);
                                    Ez = Ay_s_val * Math.sin(k * x_arrow - t_snapshot);
                                    break;
                                case 'elliptical':
                                    Ey = Ay_s_val * Math.cos(k * x_arrow - t_snapshot);
                                    Ez = Az_s_val * Math.sin(k * x_arrow - t_snapshot);

                                case 'unpolarized':

                                    const waveModulation = A * Math.cos(k * x_arrow - t_snapshot);
                                    Ey = waveModulation * Math.cos(arrow.userData.randomAngleSpatial);
                                    Ez = waveModulation * Math.sin(arrow.userData.randomAngleSpatial);
                                    break;
                                default:
                                    Ey = Ay_s_val;
                                    Ez = 0;
                            }
                            const direction = new THREE.Vector3(0, Ey, Ez);
                            let currentLength = direction.length();
                            if (currentLength < 0.001) {
                                direction.set(0, 1, 0);
                                arrow.visible = false;
                                currentLength = 0;
                            } else {
                                arrow.visible = true;
                                direction.normalize();
                            }
                            arrow.setDirection(direction);
                            const headL = Math.max(0.05, 0.25 * currentLength);
                            const headW = Math.max(0.025, 0.15 * currentLength);
                            arrow.setLength(currentLength, headL, headW);
                        });
                        // Update helix path (if active) — analytic continuous curve through arrow tips
                        if (polarizationHelixPath) {
                            const N = polarizationHelixPath.userData.points;
                            const pos = polarizationHelixPath.geometry.attributes.position.array;
                            for (let i = 0; i < N; i++) {
                                const x = -waveParams.extent / 2 + (i / (N - 1)) * waveParams.extent;
                                let Eyh = 0, Ezh = 0;
                                switch (waveParams.polarizationType) {
                                    case 'circular_right_expected':
                                        Eyh = Ay_s_val * Math.cos(k * x);
                                        Ezh = -Ay_s_val * Math.sin(k * x);
                                        break;
                                    case 'circular_left_expected':
                                        Eyh = Ay_s_val * Math.cos(k * x);
                                        Ezh = Ay_s_val * Math.sin(k * x);
                                        break;
                                    case 'elliptical':
                                        Eyh = Ay_s_val * Math.cos(k * x);
                                        Ezh = Az_s_val * Math.sin(k * x);
                                        break;
                                }
                                pos[i * 3] = x;
                                pos[i * 3 + 1] = Eyh;
                                pos[i * 3 + 2] = Ezh;
                            }
                            polarizationHelixPath.geometry.attributes.position.needsUpdate = true;
                        }
                    }
                    break;
                }
                case 'poynting_vector': {
                    const E0 = waveParams.amplitude;
                    if (waveLine1) updateWaveGeometry(waveLine1, waveParams.wavelength, E0, 0);
                    if (poyntingArrowViz) {

                        const headLength = Math.max(0.1, 0.25 * poyntingMagnitude);
                        const headWidth = Math.max(0.05, 0.12 * poyntingMagnitude);

                    }
                    break;
                }
                case 'phase_group_velocity': {
                    const baseAmp = waveParams.amplitude;
                    const baseLambda = waveParams.wavelength;
                    const k0 = (2 * Math.PI) / baseLambda;
                    const baseOmega = omegaAnimation * 1.2;
                    const v0_ref_global = baseOmega / k0;
                    if (waveParams.velocityDisplayType === 'phase') {
                        if (waveLine1 && phaseMarkerViz) {
                            const phaseOffset = -baseOmega * animationTime;
                            updateWaveGeometry(waveLine1, baseLambda, baseAmp, phaseOffset);
                            let markerX = (Math.PI / 2 - phaseOffset) / k0;
                            while (markerX > waveParams.extent / 2 + baseLambda) markerX -= baseLambda;
                            while (markerX < -waveParams.extent / 2 - baseLambda) markerX += baseLambda;
                            if (markerX > waveParams.extent / 2) markerX -= baseLambda;
                            else if (markerX < -waveParams.extent / 2) markerX += baseLambda;
                            phaseMarkerViz.position.set(markerX, baseAmp * Math.sin(k0 * markerX + phaseOffset), 0.01);

                        const readout = document.getElementById('velocity-readout');
